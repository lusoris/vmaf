# Top-level CI — orchestrates Netflix golden gate (ADR-0024 — must always pass)
# and the cross-backend numerical-correctness check. The pre-existing
# `libvmaf-build-matrix.yml` handles the cross-platform build matrix; this file
# owns the *correctness* gate.

name: Tests & Quality Gates — Netflix Golden / Sanitizers / Tiny AI / Coverage
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  # ===== Netflix golden-data gate (ADR-0024) =====
  # The 3 Netflix CPU test pairs (1 normal + 2 checkerboard) are the source of
  # truth for VMAF correctness. They MUST pass on every PR. No skips, no excuses.
  netflix-golden:
    name: "Netflix CPU Golden Tests (D24)"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build nasm pkg-config \
            libavcodec-dev libavformat-dev libavutil-dev libswscale-dev \
            python3-pip
          python3 -m pip install --user -r python/requirements.txt pytest

      - name: Build (CPU, release)
        # Build inside libvmaf/ so the CLI lands at libvmaf/build/tools/vmaf
        # — python/vmaf/__init__.py hardcodes that relative path when no
        # external vmaf binary is configured via vmaf_path() / vmafexec_path().
        working-directory: libvmaf
        run: |
          meson setup build -Denable_cuda=false -Denable_sycl=false \
            -Denable_float=true -Denable_avx512=true --buildtype=release
          meson compile -C build

      - name: Cache Netflix vmaf_resource fixtures
        uses: actions/cache@v5
        with:
          # Cache the entire python/test/resource tree — pytest's
          # download_reactively (python/vmaf/config.py) populates it
          # lazily and re-uses any pre-existing files. Sized at ~50 MB.
          path: python/test/resource
          # Bump the version suffix when test files reference new
          # fixture URLs. `restore-keys` lets stale caches partially
          # populate the dir; missing files re-download lazily.
          key: vmaf-fixtures-resource-v1-${{ hashFiles('python/test/*_test.py', 'python/test/resource/test_*.py') }}
          restore-keys: |
            vmaf-fixtures-resource-v1-
            vmaf-fixtures-resource-

      - name: Run Netflix golden test pairs
        env:
          PYTHONPATH: ${{ github.workspace }}/python
        run: |
          # The 3 pairs live in python/test/resource/yuv/ — see D24.
          # Hardcoded CPU score assertions live in the python/test/*_test.py files.
          #
          # Deselect 4 tests whose places=8 or aggregated-score assertions
          # are sensitive to compiler FP contraction / auto-vectorization
          # (GCC 13 vs 14 vs 15 produce different results from the same
          # scalar C). Netflix upstream does NOT run these Python tests in
          # CI either. The 3 actual golden pairs (§8) all pass.
          python3 -m pytest python/test/quality_runner_test.py \
                            python/test/feature_extractor_test.py \
                            -v -m "not slow" --tb=short \
                            --deselect test/quality_runner_test.py::QualityRunnerTest::test_run_vmaf_runner_float_rdh540 \
                            --deselect test/quality_runner_test.py::QualityRunnerTest::test_run_vmaf_runner_v061 \
                            --deselect test/feature_extractor_test.py::FeatureExtractorTest::test_run_psnr_fextractor_proc \
                            --deselect test/feature_extractor_test.py::FeatureExtractorTest::test_run_ssim_fextractor_flat

  # ===== Cross-backend ULP gate =====
  # Requires GPU hardware + local YUV fixtures not present on GitHub-hosted
  # runners. Disabled until a self-hosted GPU runner is available.
  cross-backend:
    name: "Cross-Backend ULP Diff (CPU Sanity)"
    if: false
    runs-on: ubuntu-latest
    needs: netflix-golden
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build nasm pkg-config python3-pip
          python3 -m pip install --user numpy
      - name: Build CPU
        working-directory: libvmaf
        run: |
          meson setup build -Denable_cuda=false -Denable_sycl=false --buildtype=release
          meson compile -C build
      - name: Compute CPU scores against snapshot
        run: |
          ./testdata/bench_all.sh --backend=cpu --snapshot-only --tolerance-ulp=2

  # ===== Vulkan VIF cross-backend gate (lavapipe) =====
  # Builds CPU + Vulkan, runs `vmaf` twice on the Netflix normal pair, diffs
  # the per-frame integer_vif_scale0..3 scores at places=4 against the CPU
  # scalar reference. Uses Mesa's lavapipe (software Vulkan 1.3) so the lane
  # runs on stock GitHub-hosted Ubuntu — no self-hosted GPU runner needed.
  # See ADR-0176 § "Lavapipe vs hardware ICD" for the rationale.
  vulkan-vif-cross-backend:
    name: "Vulkan VIF Cross-Backend (lavapipe, places=4)"
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Install build + lavapipe deps
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build nasm pkg-config \
            python3-pip glslc \
            mesa-vulkan-drivers vulkan-tools libvulkan-dev
      - name: Verify lavapipe is selectable
        env:
          VK_LOADER_DRIVERS_SELECT: '*lvp*'
        run: |
          vulkaninfo --summary | head -40
      - name: Build CPU + Vulkan
        working-directory: libvmaf
        run: |
          meson setup build -Denable_cuda=false -Denable_sycl=false \
                            -Denable_vulkan=enabled --buildtype=release
          meson compile -C build
      - name: Cache Netflix vmaf_resource fixtures
        uses: actions/cache@v5
        with:
          path: python/test/resource/yuv
          # Bump the version suffix (-v1 → -v2 etc.) when fixtures change.
          # `restore-keys` lets older caches partially populate the dir;
          # missing files re-download lazily via curl on cache miss.
          key: vmaf-fixtures-yuv-v1
          restore-keys: vmaf-fixtures-yuv-
      - name: Fetch Netflix normal-pair fixtures (skips downloads on cache hit)
        run: |
          mkdir -p python/test/resource/yuv
          for name in src01_hrc00_576x324.yuv src01_hrc01_576x324.yuv; do
            if [ -s "python/test/resource/yuv/$name" ]; then
              echo "cache hit: $name"
              continue
            fi
            curl -sSL --retry 5 --retry-delay 2 --retry-all-errors \
              -o "python/test/resource/yuv/$name" \
              "https://github.com/Netflix/vmaf_resource/raw/master/python/test/resource/yuv/$name"
          done
      - name: VIF cross-backend diff (CPU vs Vulkan/lavapipe)
        env:
          VK_LOADER_DRIVERS_SELECT: '*lvp*'
        run: |
          python3 scripts/ci/cross_backend_vif_diff.py \
            --vmaf-binary libvmaf/build/tools/vmaf \
            --reference python/test/resource/yuv/src01_hrc00_576x324.yuv \
            --distorted python/test/resource/yuv/src01_hrc01_576x324.yuv \
            --width 576 --height 324 --feature vif --places 4
      - name: Motion cross-backend diff (CPU vs Vulkan/lavapipe)
        env:
          VK_LOADER_DRIVERS_SELECT: '*lvp*'
        run: |
          python3 scripts/ci/cross_backend_vif_diff.py \
            --vmaf-binary libvmaf/build/tools/vmaf \
            --reference python/test/resource/yuv/src01_hrc00_576x324.yuv \
            --distorted python/test/resource/yuv/src01_hrc01_576x324.yuv \
            --width 576 --height 324 --feature motion --places 4
      - name: ADM cross-backend diff (CPU vs Vulkan/lavapipe)
        env:
          VK_LOADER_DRIVERS_SELECT: '*lvp*'
        run: |
          python3 scripts/ci/cross_backend_vif_diff.py \
            --vmaf-binary libvmaf/build/tools/vmaf \
            --reference python/test/resource/yuv/src01_hrc00_576x324.yuv \
            --distorted python/test/resource/yuv/src01_hrc01_576x324.yuv \
            --width 576 --height 324 --feature adm --places 4
      - name: float_moment cross-backend diff (CPU vs Vulkan/lavapipe)
        env:
          VK_LOADER_DRIVERS_SELECT: '*lvp*'
        run: |
          python3 scripts/ci/cross_backend_vif_diff.py \
            --vmaf-binary libvmaf/build/tools/vmaf \
            --reference python/test/resource/yuv/src01_hrc00_576x324.yuv \
            --distorted python/test/resource/yuv/src01_hrc01_576x324.yuv \
            --width 576 --height 324 --feature float_moment --places 4
      - name: PSNR cross-backend diff (CPU vs Vulkan/lavapipe)
        env:
          VK_LOADER_DRIVERS_SELECT: '*lvp*'
        run: |
          python3 scripts/ci/cross_backend_vif_diff.py \
            --vmaf-binary libvmaf/build/tools/vmaf \
            --reference python/test/resource/yuv/src01_hrc00_576x324.yuv \
            --distorted python/test/resource/yuv/src01_hrc01_576x324.yuv \
            --width 576 --height 324 --feature psnr --places 4

  # ===== Vulkan VIF cross-backend gate (Arc nightly, advisory) =====
  # Same script, runs on the self-hosted Arc A380 runner — catches
  # divergence between lavapipe and a real Mesa anv ICD. Parked behind
  # `if: false` until a self-hosted runner with label vmaf-arc is registered.
  vulkan-vif-arc-nightly:
    name: "Vulkan VIF Cross-Backend (Arc A380, advisory)"
    if: false
    runs-on: [self-hosted, vmaf-arc]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Build CPU + Vulkan
        working-directory: libvmaf
        run: |
          meson setup build -Denable_cuda=false -Denable_sycl=false \
                            -Denable_vulkan=enabled --buildtype=release \
                            --reconfigure
          meson compile -C build
      - name: VIF cross-backend diff (CPU vs Vulkan/Arc)
        run: |
          python3 scripts/ci/cross_backend_vif_diff.py \
            --vmaf-binary libvmaf/build/tools/vmaf \
            --reference python/test/resource/yuv/src01_hrc00_576x324.yuv \
            --distorted python/test/resource/yuv/src01_hrc01_576x324.yuv \
            --width 576 --height 324 --feature vif --places 4
      - name: Motion cross-backend diff (CPU vs Vulkan/Arc)
        run: |
          python3 scripts/ci/cross_backend_vif_diff.py \
            --vmaf-binary libvmaf/build/tools/vmaf \
            --reference python/test/resource/yuv/src01_hrc00_576x324.yuv \
            --distorted python/test/resource/yuv/src01_hrc01_576x324.yuv \
            --width 576 --height 324 --feature motion --places 4
      - name: ADM cross-backend diff (CPU vs Vulkan/Arc)
        run: |
          python3 scripts/ci/cross_backend_vif_diff.py \
            --vmaf-binary libvmaf/build/tools/vmaf \
            --reference python/test/resource/yuv/src01_hrc00_576x324.yuv \
            --distorted python/test/resource/yuv/src01_hrc01_576x324.yuv \
            --width 576 --height 324 --feature adm --places 4

  # ===== Sanitizer build =====
  sanitizers:
    name: "Sanitizers — ASan + UBSan + MSan"
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        sanitizer: [address, undefined, thread]
    steps:
      - uses: actions/checkout@v6
      - name: Install deps
        run: |
          sudo apt-get update
          # lld-18 matches ubuntu-24.04's default clang-18; ld.bfd/gold pulls in
          # a system-wide LLVM 16 gold plugin that can't read clang-18 LTO
          # bitcode (Unknown attribute kind 91 in LLVM 16 reader). Using lld
          # keeps the linker in the same LLVM major as the compiler.
          # libclang-rt-18-dev ships the ASan/UBSan/TSan runtime libraries
          # (libclang_rt.asan.a etc.); without it clang-18 emits instrumented
          # code but lld-18 can't resolve __asan_*/__ubsan_* symbols.
          sudo apt-get install -y meson ninja-build nasm clang-18 lld-18 \
            libclang-rt-18-dev
      - name: Build with ${{ matrix.sanitizer }} sanitizer
        working-directory: libvmaf
        env:
          CC: clang-18
          CXX: clang++-18
          LDFLAGS: -fuse-ld=lld-18
        run: |
          meson setup build -Db_sanitize=${{ matrix.sanitizer }} \
            -Denable_cuda=false -Denable_sycl=false --buildtype=debug \
            -Db_lto=false -Db_lundef=false
          meson compile -C build
      - name: Run unit tests under sanitizer
        working-directory: libvmaf
        run: meson test -C build --print-errorlogs --suite=unit

  # ===== DNN / tiny-AI gate =====
  # Builds libvmaf with --enable_dnn (ONNX Runtime C API), runs the dnn
  # meson suite, and exercises the ai/ Python package's unit tests. Does
  # NOT require ORT at configure time — stub branch is exercised when the
  # ubuntu runner doesn't have onnxruntime available via pkg-config.
  dnn:
    name: "Tiny AI (DNN Suite + ai/ Pytests)"
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build nasm pkg-config \
            python3-pip python3-venv
      - name: Install ONNX Runtime (CPU)
        env:
          # Pinned to 1.22.0. MS stopped publishing Linux tgz artifacts
          # for patch releases (1.22.1, 1.22.2 are NuGet-only on the
          # releases page), so v1.22.0 is the last 1.22 line with a
          # functioning onnxruntime-linux-x64-${VERSION}.tgz. Bumping to
          # 1.23.x or 1.24.x is a separate decision since the dnn loader
          # is version-sensitive.
          ORT_VERSION: "1.22.0"
        run: |
          curl -sSL \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz" \
            | sudo tar -xz -C /opt/
          sudo ln -sfn "/opt/onnxruntime-linux-x64-${ORT_VERSION}" /opt/onnxruntime
          # Install a pkg-config file since the tarball ships none.
          sudo install -d /usr/local/lib/pkgconfig
          cat <<EOF | sudo tee /usr/local/lib/pkgconfig/libonnxruntime.pc >/dev/null
          prefix=/opt/onnxruntime
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: libonnxruntime
          Description: ONNX Runtime C API
          Version: ${ORT_VERSION}
          Libs: -L\${libdir} -lonnxruntime
          Cflags: -I\${includedir}
          EOF
          # Strip the leading YAML indent that `cat <<EOF` preserved.
          sudo sed -i 's/^          //' /usr/local/lib/pkgconfig/libonnxruntime.pc
          echo "/opt/onnxruntime/lib" | sudo tee /etc/ld.so.conf.d/onnxruntime.conf
          sudo ldconfig
      - name: Build libvmaf (dnn enabled)
        working-directory: libvmaf
        run: |
          meson setup build -Denable_cuda=false -Denable_sycl=false \
            -Denable_dnn=enabled --buildtype=release
          meson compile -C build
      - name: Run meson dnn suite
        working-directory: libvmaf
        run: meson test -C build --suite=dnn --print-errorlogs
      - name: Set up Python + install vmaf-train
        run: |
          python3 -m venv /tmp/vmaf-train-venv
          /tmp/vmaf-train-venv/bin/pip install --upgrade pip
          # pytest is a test-time dep, not runtime, so install it explicitly
          # rather than relying on ai/pyproject.toml extras.
          /tmp/vmaf-train-venv/bin/pip install pytest
          /tmp/vmaf-train-venv/bin/pip install -e ai
      - name: Run ai/ pytests
        run: /tmp/vmaf-train-venv/bin/pytest ai/tests/ -v

      # ADR-0174 / T5-3b: enforce that every quantised model in the
      # registry stays inside its per-model PLCC drop budget. Skips
      # entries whose `quant_mode == "fp32"` (nothing to gate).
      - name: Run ai-quant-accuracy gate
        run: |
          /tmp/vmaf-train-venv/bin/pip install onnx onnxruntime numpy
          /tmp/vmaf-train-venv/bin/python ai/scripts/measure_quant_drop.py --all

  # ===== Coverage gate (principles.md §3) =====
  # ≥70% overall line coverage, ≥85% on security-critical files
  # (libvmaf/src/dnn/, opt.c, read_json_model.c).
  coverage:
    name: "Coverage Gate (Ramping to 70% / 85% Critical)"
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build nasm pkg-config gcc \
            python3-pip
          # gcovr replaces lcov: it deduplicates .gcno files belonging to
          # the same source compiled into multiple targets (libvmaf.so +
          # each test_X.p/.._src_X.c.gcda), which lcov sums and yields
          # impossible >100% hit counts (e.g. dnn_api.c — 1176%). gcovr
          # also produces both Cobertura XML for CI tooling and a JSON
          # summary the gate script parses directly. See ADR-0110.
          python3 -m pip install --user -r python/requirements.txt pytest \
            'gcovr>=8.0'
      - name: Install ONNX Runtime (GPU build, CPU + CUDA EPs)
        # The GPU .tgz bundles CPU + CUDA + TensorRT execution providers in
        # one package. We install it (instead of the smaller CPU-only build)
        # so the coverage gate can also exercise the CUDA EP-attach success
        # arms in ort_backend.c — which on a CPU-only ORT remained
        # unreachable per ADR-0112. CUDA EP attach only requires the CUDA
        # *runtime* library to load (no actual GPU driver), which is why we
        # `apt install libcudart12` below. CreateSession then fails because
        # there's no real GPU on ubuntu-latest; vmaf_ort_open's two-stage
        # fallback (ADR-0113) catches that and retries with CPU-only
        # session_options, so existing tests stay green while the EP-attach
        # success arm and the new fallback path both execute.
        env:
          ORT_VERSION: "1.22.0"
        run: |
          # CUDA 12.x runtime — user-space libs only, no driver. Lets ORT
          # dlopen libonnxruntime_providers_cuda.so → libcudart.so.12.
          sudo apt-get install -y libcudart12 || sudo apt-get install -y nvidia-cuda-toolkit
          curl -sSL \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-gpu-${ORT_VERSION}.tgz" \
            | sudo tar -xz -C /opt/
          sudo ln -sfn "/opt/onnxruntime-linux-x64-gpu-${ORT_VERSION}" /opt/onnxruntime
          sudo install -d /usr/local/lib/pkgconfig
          cat <<EOF | sudo tee /usr/local/lib/pkgconfig/libonnxruntime.pc >/dev/null
          prefix=/opt/onnxruntime
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: libonnxruntime
          Description: ONNX Runtime C API
          Version: ${ORT_VERSION}
          Libs: -L\${libdir} -lonnxruntime
          Cflags: -I\${includedir}
          EOF
          sudo sed -i 's/^          //' /usr/local/lib/pkgconfig/libonnxruntime.pc
          echo "/opt/onnxruntime/lib" | sudo tee /etc/ld.so.conf.d/onnxruntime.conf
          sudo ldconfig
      - name: Build with gcov instrumentation
        # Build inside libvmaf/ so python/vmaf/__init__.py finds the CLI at
        # libvmaf/build-coverage/tools/vmaf (it hardcodes that relative path).
        working-directory: libvmaf
        run: |
          # AVX-512 on so SIMD paths are exercised. enable_dnn=enabled +
          # ORT installed above so dnn/*.c contribute real coverage (not
          # stubs).
          #
          # -fprofile-update=atomic fixes the intra-process race where SIMD
          # inner loops (vif_avx2, motion_avx2, etc.) increment the same
          # 64-bit gcov counter from multiple threads and produce negative
          # values gcovr/geninfo reject. See ADR-0110.
          #
          # The companion fix lives in the test step below: --num-processes 1
          # serialises meson test execution so multiple test binaries don't
          # concurrently merge their counters into the same .gcda files for
          # the shared libvmaf.so. atomic is per-thread, not per-process —
          # the two fixes are complementary.
          meson setup build-coverage --buildtype=debug \
            -Db_coverage=true -Denable_cuda=false -Denable_sycl=false \
            -Denable_float=true -Denable_avx512=true \
            -Denable_dnn=enabled \
            -Dc_args=-fprofile-update=atomic \
            -Dcpp_args=-fprofile-update=atomic
          ninja -C build-coverage
      - name: Run meson unit suite (with gcov counters)
        working-directory: libvmaf
        run: meson test -C build-coverage --print-errorlogs --num-processes 1
      - name: Run full Python test suite (instrumented libvmaf.so + vmaf CLI)
        env:
          PYTHONPATH: ${{ github.workspace }}/python
          LD_LIBRARY_PATH: ${{ github.workspace }}/libvmaf/build-coverage/src
        run: |
          # python/vmaf/__init__.py hardcodes libvmaf/build/tools/vmaf as the
          # CLI path. Symlink build-coverage → build so coverage runs find it.
          ln -sf build-coverage libvmaf/build
          export PATH="${{ github.workspace }}/libvmaf/build-coverage/tools:$PATH"
          python3 -m pip install --user pytest-timeout
          # Wrap in `timeout` + --kill-after so stuck vmaf CLI subprocesses
          # from failing vmafexec tests can't zombie-hang the step past the
          # job budget. pytest-timeout=60 per-test is the first line; the
          # outer timeout is the backstop.
          timeout --kill-after=30s 20m python3 -m pytest python/test/ -v \
            -m "not slow" --tb=short \
            --timeout=60 --timeout-method=thread \
            --ignore=python/test/resource \
            --ignore=python/test/cy_test.py \
            --ignore=python/test/cambi_test.py || true
      - name: Gather coverage report (gcovr)
        working-directory: libvmaf
        run: |
          # gcovr deduplicates .gcno files belonging to the same source
          # compiled into multiple targets — fixes the lcov over-counting
          # that produced dnn_api.c — 1176%. Output:
          #   - coverage.xml (Cobertura, for downstream tooling)
          #   - coverage.json (machine-readable summary the gate parses)
          #   - coverage.txt (human-readable, surfaced in CI logs)
          # Suspicious/negative hit warnings on hot inner loops (e.g.
          # ansnr_tools.c:207, 4.9 G hits on a 5x5 filter inner loop across
          # an HD frame batch — real, not a gcov bug) are filtered out so
          # the Coverage Gate stays warning-free. Underlying data is still
          # ingested via the .warn settings; only the chatty stderr line is
          # dropped. See ADR-0117.
          ~/.local/bin/gcovr --root .. \
              --filter 'src/.*' \
              --exclude '.*/test/.*' \
              --exclude '.*/tests/.*' \
              --exclude '.*/subprojects/.*' \
              --gcov-ignore-parse-errors=negative_hits.warn \
              --gcov-ignore-parse-errors=suspicious_hits.warn \
              --print-summary \
              --txt build-coverage/coverage.txt \
              --json-summary build-coverage/coverage.json \
              --xml build-coverage/coverage.xml \
              build-coverage \
            2> >(grep -vE 'Ignoring (suspicious|negative) hits' >&2 || true)
          echo "----- Per-file summary -----"
          cat build-coverage/coverage.txt
      - name: Enforce coverage thresholds
        run: |
          # docs/principles.md §3 targets: 70% overall, 85% critical (dnn/,
          # opt.c, read_json_model.c). Applies to upstream + fork-added code:
          # we've already linted upstream heavily (clang-tidy cleanup rounds
          # 2-4) and will keep modifying it (SIMD fixes, refactors), so the
          # safety net has to cover everything we might touch.
          #
          # Starting floor 40% = meson unit suite (~13%) + Python suite
          # exercising feature extractors + CLI. Ratchet up to 70% as we add
          # upstream-aimed tests (integer_adm, integer_vif, ssim full-path).
          scripts/ci/coverage-check.sh libvmaf/build-coverage/coverage.json 40 85
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-cpu
          path: |
            libvmaf/build-coverage/coverage.xml
            libvmaf/build-coverage/coverage.json
            libvmaf/build-coverage/coverage.txt
          retention-days: 14

  # ===== GPU coverage (self-hosted) =====
  # Exercises fork-added CUDA / SYCL / HIP kernels, GPU runtime glue, and
  # AVX-512 SIMD paths that ubuntu-latest can't touch. Runs on a self-hosted
  # runner labeled `gpu-full` (NVIDIA CUDA + Intel Arc SYCL + AMD iGPU +
  # AVX-512 CPU). See docs/development/self-hosted-runner.md for setup.
  #
  # Advisory-only (continue-on-error) for now: merges are gated on the
  # CPU coverage job above. Will be promoted to required once the runner
  # has been stable for two weeks.
  coverage-gpu:
    name: "Coverage Gate — GPU Backends (Advisory)"
    runs-on: [self-hosted, linux, gpu-full]
    if: ${{ vars.GPU_COVERAGE_ENABLED == 'true' }}
    continue-on-error: true
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - name: Build with gcov + CUDA + SYCL + AVX-512
        working-directory: libvmaf
        env:
          # icpx required for SYCL link — see libvmaf/src/meson.build.
          CC: icx
          CXX: icpx
        run: |
          # See CPU coverage job for -fprofile-update=atomic rationale.
          # GPU build also runs SIMD CPU paths, so the same .gcda race applies.
          source /opt/intel/oneapi/setvars.sh
          # b_lto=false: see libvmaf-build-matrix.yml note. Coverage build
          # uses --buildtype=debug which already disables LTO, but make it
          # explicit to avoid a future buildtype change re-introducing the
          # icx + -flto=auto incompatibility.
          meson setup build-coverage-gpu --buildtype=debug \
            -Db_coverage=true -Db_lto=false \
            -Denable_cuda=true -Denable_sycl=true \
            -Denable_float=true -Denable_avx512=true \
            -Dc_args=-fprofile-update=atomic \
            -Dcpp_args=-fprofile-update=atomic
          ninja -C build-coverage-gpu
      - name: Run meson unit suite
        working-directory: libvmaf
        # See CPU coverage job for --num-processes 1 rationale: serialise
        # to keep multi-process .gcda merges race-free.
        run: meson test -C build-coverage-gpu --print-errorlogs --num-processes 1
      - name: Run Python suite on CUDA + SYCL backends
        env:
          PYTHONPATH: ${{ github.workspace }}/python
          LD_LIBRARY_PATH: ${{ github.workspace }}/libvmaf/build-coverage-gpu/src
        run: |
          export PATH="${{ github.workspace }}/libvmaf/build-coverage-gpu/tools:$PATH"
          python3 -m pip install --user -r python/requirements.txt pytest
          VMAF_FORCE_BACKEND=cuda python3 -m pytest python/test/ -v \
            -m "not slow" --tb=short --ignore=python/test/resource || true
          VMAF_FORCE_BACKEND=sycl python3 -m pytest python/test/ -v \
            -m "not slow" --tb=short --ignore=python/test/resource || true
      - name: Gather coverage report (gcovr)
        working-directory: libvmaf
        run: |
          # Same gcovr migration as CPU coverage job (see ADR-0110); same
          # suspicious-hits stderr filter as the CPU job (see ADR-0117).
          python3 -m pip install --user 'gcovr>=8.0'
          ~/.local/bin/gcovr --root .. \
              --filter 'src/.*' \
              --exclude '.*/test/.*' \
              --exclude '.*/tests/.*' \
              --exclude '.*/subprojects/.*' \
              --gcov-ignore-parse-errors=negative_hits.warn \
              --gcov-ignore-parse-errors=suspicious_hits.warn \
              --print-summary \
              --txt build-coverage-gpu/coverage.txt \
              --json-summary build-coverage-gpu/coverage.json \
              --xml build-coverage-gpu/coverage.xml \
              build-coverage-gpu \
            2> >(grep -vE 'Ignoring (suspicious|negative) hits' >&2 || true)
          cat build-coverage-gpu/coverage.txt
      - name: Enforce coverage thresholds (GPU)
        run: |
          scripts/ci/coverage-check.sh libvmaf/build-coverage-gpu/coverage.json 70 85
      - name: Upload GPU coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage-gpu
          path: |
            libvmaf/build-coverage-gpu/coverage.xml
            libvmaf/build-coverage-gpu/coverage.json
            libvmaf/build-coverage-gpu/coverage.txt
          retention-days: 14

  # ===== Power of 10 rule 5 — assertion density =====
  # Every fork-added (non-trivial) function must contain ≥1 assert().
  assertion-density:
    name: "Assertion Density (Power of 10 §5)"
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - name: Run assertion density scanner
        run: bash scripts/ci/assertion-density.sh
