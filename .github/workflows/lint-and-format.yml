# Static-analysis gate. Runs in parallel with the libvmaf Build Matrix so a
# lint failure doesn't block discovering build breakage and vice versa.

name: Lint & Format — Pre-Commit / Clang-Tidy / Cppcheck / Python / Shell
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-Commit (Formatters + Basic Checks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Resolve LFS blobs (e.g. model/tiny/*.onnx) so pre-commit's final
          # "changes made by hooks" diff doesn't report pointer-vs-blob noise
          # against files no hook actually touched.
          lfs: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # pre-commit/action@v3.0.1 is the latest release (Feb 2024) and still
      # pins actions/cache@v4, which trips the Node.js 20 deprecation
      # warning (Node 20 removed from runners 2026-09-16). Inline the
      # three steps it would have run, using actions/cache@v5.
      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py3.12-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-py3.12-
      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit
      - name: Run pre-commit on all files
        run: pre-commit run --show-diff-on-failure --color=always --all-files

  clang-tidy:
    name: Clang-Tidy (Changed C/C++ Files)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          # Need history for the push-delta diff on master. fetch-depth: 2
          # is enough for a squash-merge FF (one new commit), but use 0 to
          # tolerate multi-commit FF pushes without a second fetch step.
          fetch-depth: 0
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build nasm clang-tidy-18 \
            jq parallel
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy \
            /usr/bin/clang-tidy-18 100
      - name: Generate compile_commands.json
        run: |
          meson setup build libvmaf -Denable_cuda=false -Denable_sycl=false
          # Build first so codegen outputs (vcs_version.h, model JSONs → .c)
          # exist on disk before clang-tidy parses the translation units.
          meson compile -C build
      - name: Run clang-tidy on changed files
        run: |
          # Collect the delta for both PR and push events so master-post-merge
          # doesn't re-scan every vendored .c/.cpp (e.g. libvmaf/src/svm.cpp)
          # and surface pre-existing warnings unrelated to the push.
          #
          # Excluded path families — the shared reason is that the compile
          # commands in `build/compile_commands.json` don't cover these TUs
          # (CPU-only + ARM-only build here), so clang-tidy parses them with
          # default flags and spurious `clang-diagnostic-error` output:
          #   - libvmaf/src/feature/arm64/ — NEON, needs cross-toolchain.
          #   - libvmaf/src/cuda/ + libvmaf/src/feature/cuda/ — require
          #     `-Denable_cuda=true` meson setup to generate compile_commands
          #     (follow-up: add a parallel CUDA clang-tidy job once a
          #     self-hosted CUDA runner lands, backlog T7-3).
          #   - libvmaf/test/test_cuda_*.c + test_gpu_picture_pool.c — GPU-gated
          #     tests whose build entries only exist under the CUDA build.
          #     test_gpu_picture_pool.c is the renamed test_ring_buffer.c per
          #     ADR-0239 (still CUDA-only — it pulls in libvmaf_cuda.h).
          #   - libvmaf/src/sycl/ + libvmaf/src/feature/sycl/ +
          #     libvmaf/test/test_sycl* — require `-Denable_sycl=true` and
          #     the `icpx` compiler; no compile_commands in the CPU-only
          #     `build/`. Local lint runs against `libvmaf/build-sycl/`.
          #   - libvmaf/tools/vmaf_vpl.c — VAAPI integration; needs
          #     `va/va.h` from libva-dev plus the CUDA/SYCL link path; no
          #     compile_commands entry in the CPU-only build.
          #   - libvmaf/src/mcp/ + libvmaf/test/test_mcp_smoke.c —
          #     gated by `-Denable_mcp=true`; the CPU-only lint build
          #     has the umbrella flag off (ADR-0209 audit-first
          #     scaffold, T5-2). Local lint runs against a build
          #     configured with `-Denable_mcp=true -Denable_mcp_sse=true
          #     -Denable_mcp_uds=true -Denable_mcp_stdio=true`.
          # Local lint on these files runs against `libvmaf/build-cuda/`.
          # `--diff-filter=d` excludes Deleted entries — clang-tidy can't
          # lint a file that no longer exists on disk; without this filter
          # the script passes a missing path to clang-tidy and fails with
          # `clang-diagnostic-error: no such file or directory`.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(git diff --name-only --diff-filter=d \
              origin/${{ github.base_ref }}...HEAD \
              -- '*.c' '*.h' '*.cpp' '*.hpp' \
              | grep -v '^libvmaf/src/feature/arm64/' \
              | grep -v '^libvmaf/src/cuda/' \
              | grep -v '^libvmaf/src/feature/cuda/' \
              | grep -v '^libvmaf/test/test_cuda_' \
              | grep -v '^libvmaf/test/test_gpu_picture_pool\.c$' \
              | grep -v '^libvmaf/src/sycl/' \
              | grep -v '^libvmaf/src/feature/sycl/' \
              | grep -v '^libvmaf/test/test_sycl' \
              | grep -v '^libvmaf/tools/vmaf_vpl\.c$' \
              | grep -v '^libvmaf/src/vulkan/' \
              | grep -v '^libvmaf/src/feature/vulkan/' \
              | grep -v '^libvmaf/test/test_vulkan' \
              | grep -v '^libvmaf/src/mcp/' \
              | grep -v '^libvmaf/test/test_mcp' \
              | tr '\n' ' ')
          elif [ "${{ github.event_name }}" = "push" ]; then
            before="${{ github.event.before }}"
            zero="0000000000000000000000000000000000000000"
            if [ -z "$before" ] || [ "$before" = "$zero" ]; then
              # Initial push / new branch: fall back to HEAD~1..HEAD if a
              # parent exists, otherwise skip (no meaningful delta).
              if git rev-parse HEAD~1 >/dev/null 2>&1; then
                files=$(git diff --name-only --diff-filter=d HEAD~1..HEAD \
                  -- '*.c' '*.h' '*.cpp' '*.hpp' \
                  | grep -v '^libvmaf/src/feature/arm64/' \
              | grep -v '^libvmaf/src/cuda/' \
              | grep -v '^libvmaf/src/feature/cuda/' \
              | grep -v '^libvmaf/test/test_cuda_' \
              | grep -v '^libvmaf/test/test_gpu_picture_pool\.c$' \
              | grep -v '^libvmaf/src/sycl/' \
              | grep -v '^libvmaf/src/feature/sycl/' \
              | grep -v '^libvmaf/test/test_sycl' \
              | grep -v '^libvmaf/tools/vmaf_vpl\.c$' \
              | grep -v '^libvmaf/src/vulkan/' \
              | grep -v '^libvmaf/src/feature/vulkan/' \
              | grep -v '^libvmaf/test/test_vulkan' \
              | grep -v '^libvmaf/src/mcp/' \
              | grep -v '^libvmaf/test/test_mcp' \
              | tr '\n' ' ')
              else
                files=""
              fi
            else
              files=$(git diff --name-only --diff-filter=d "$before"..HEAD \
                -- '*.c' '*.h' '*.cpp' '*.hpp' \
                | grep -v '^libvmaf/src/feature/arm64/' \
              | grep -v '^libvmaf/src/cuda/' \
              | grep -v '^libvmaf/src/feature/cuda/' \
              | grep -v '^libvmaf/test/test_cuda_' \
              | grep -v '^libvmaf/test/test_gpu_picture_pool\.c$' \
              | grep -v '^libvmaf/src/sycl/' \
              | grep -v '^libvmaf/src/feature/sycl/' \
              | grep -v '^libvmaf/test/test_sycl' \
              | grep -v '^libvmaf/tools/vmaf_vpl\.c$' \
              | grep -v '^libvmaf/src/vulkan/' \
              | grep -v '^libvmaf/src/feature/vulkan/' \
              | grep -v '^libvmaf/test/test_vulkan' \
              | grep -v '^libvmaf/src/mcp/' \
              | grep -v '^libvmaf/test/test_mcp' \
              | tr '\n' ' ')
            fi
          else
            # workflow_dispatch and other triggers: scan full tree (slow
            # but deliberate — operator asked for it).
            files=$(git ls-files '*.c' '*.h' '*.cpp' '*.hpp' \
              | grep -v '^subprojects/' \
              | grep -v '^libvmaf/src/feature/arm64/' \
              | grep -v '^libvmaf/src/cuda/' \
              | grep -v '^libvmaf/src/feature/cuda/' \
              | grep -v '^libvmaf/test/test_cuda_' \
              | grep -v '^libvmaf/test/test_gpu_picture_pool\.c$' \
              | grep -v '^libvmaf/src/sycl/' \
              | grep -v '^libvmaf/src/feature/sycl/' \
              | grep -v '^libvmaf/test/test_sycl' \
              | grep -v '^libvmaf/tools/vmaf_vpl\.c$' \
              | grep -v '^libvmaf/src/vulkan/' \
              | grep -v '^libvmaf/src/feature/vulkan/' \
              | grep -v '^libvmaf/test/test_vulkan' \
              | grep -v '^libvmaf/src/mcp/' \
              | grep -v '^libvmaf/test/test_mcp' \
              | tr '\n' ' ')
          fi
          [ -z "$files" ] && { echo "no C/C++ changes"; exit 0; }
          # Drop empty lines — the `tr '\n' ' ' | tr ' ' '\n'` round-trip
          # leaves a trailing blank that parallel would pass to clang-tidy
          # as an empty filename, which clang resolves to the workspace
          # directory and reports as a clang-diagnostic-error.
          echo "$files" | tr ' ' '\n' | grep -v '^$' \
            | parallel -j$(nproc) "clang-tidy -p build --quiet {} || touch /tmp/tidy.fail"
          [ -f /tmp/tidy.fail ] && exit 1 || exit 0

  clang-tidy-sycl:
    # T7-13(b) — icpx-aware clang-tidy lane for SYCL TUs that the main
    # `clang-tidy` job above explicitly excludes (no SYCL compile_commands
    # in the CPU-only build). Uses `scripts/ci/clang-tidy-sycl.sh` to
    # inject the oneAPI SYCL include path + __SYCL_DEVICE_ONLY__=0 so
    # stock LLVM clang-tidy resolves <sycl/sycl.hpp>. Advisory until one
    # green run on master proves the wrapper holds across all current SYCL
    # TUs; tightens to required after that. See ADR-0217.
    name: Clang-Tidy SYCL (Changed Files, Advisory)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Detect changed SYCL files
        id: detect
        run: |
          # Mirrors the main clang-tidy job's PR/push/dispatch fan-out but
          # *only* keeps SYCL TUs (the inverse of the exclusion list there).
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(git diff --name-only --diff-filter=d \
              origin/${{ github.base_ref }}...HEAD \
              -- 'libvmaf/src/sycl/*.cpp' 'libvmaf/src/sycl/*.hpp' \
                 'libvmaf/src/feature/sycl/*.cpp' \
                 'libvmaf/src/feature/sycl/*.hpp' \
                 'libvmaf/test/test_sycl*.c' 'libvmaf/test/test_sycl*.cpp' \
              | tr '\n' ' ')
          elif [ "${{ github.event_name }}" = "push" ]; then
            before="${{ github.event.before }}"
            zero="0000000000000000000000000000000000000000"
            if [ -z "$before" ] || [ "$before" = "$zero" ]; then
              if git rev-parse HEAD~1 >/dev/null 2>&1; then
                files=$(git diff --name-only --diff-filter=d HEAD~1..HEAD \
                  -- 'libvmaf/src/sycl/*.cpp' 'libvmaf/src/sycl/*.hpp' \
                     'libvmaf/src/feature/sycl/*.cpp' \
                     'libvmaf/src/feature/sycl/*.hpp' \
                     'libvmaf/test/test_sycl*.c' \
                     'libvmaf/test/test_sycl*.cpp' \
                  | tr '\n' ' ')
              else
                files=""
              fi
            else
              files=$(git diff --name-only --diff-filter=d "$before"..HEAD \
                -- 'libvmaf/src/sycl/*.cpp' 'libvmaf/src/sycl/*.hpp' \
                   'libvmaf/src/feature/sycl/*.cpp' \
                   'libvmaf/src/feature/sycl/*.hpp' \
                   'libvmaf/test/test_sycl*.c' \
                   'libvmaf/test/test_sycl*.cpp' \
                | tr '\n' ' ')
            fi
          else
            files=$(git ls-files \
              'libvmaf/src/sycl/*.cpp' 'libvmaf/src/sycl/*.hpp' \
              'libvmaf/src/feature/sycl/*.cpp' \
              'libvmaf/src/feature/sycl/*.hpp' \
              'libvmaf/test/test_sycl*.c' 'libvmaf/test/test_sycl*.cpp' \
              | tr '\n' ' ')
          fi
          echo "files=$files" >> "$GITHUB_OUTPUT"
          if [ -z "$files" ]; then
            echo "no SYCL files changed — skipping job body"
          fi
      - name: Install oneAPI base toolkit
        if: steps.detect.outputs.files != ''
        run: |
          # Minimal oneAPI install — only the DPC++/C++ compiler component.
          # The full base toolkit is ~3 GiB and overkill for a header-resolve
          # path; we only need <sycl/sycl.hpp> on disk for clang-tidy.
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | sudo gpg --dearmor -o /usr/share/keyrings/oneapi-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo apt-get install -y intel-oneapi-compiler-dpcpp-cpp \
            cmake meson ninja-build nasm clang-tidy-18 jq parallel
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy \
            /usr/bin/clang-tidy-18 100
          # Level Zero loader: meson hard-requires `cc.find_library('ze_loader')`
          # under -Denable_sycl=true. Apt has no `level-zero` package on
          # ubuntu-latest; build from source (same pattern as
          # libvmaf-build-matrix.yml + ffmpeg-integration.yml).
          git clone --depth=1 --branch v1.28.0 \
            https://github.com/oneapi-src/level-zero.git /tmp/level-zero
          cmake -S /tmp/level-zero -B /tmp/level-zero/build -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build /tmp/level-zero/build -j"$(nproc)"
          sudo cmake --install /tmp/level-zero/build
          rm -rf /tmp/level-zero
      - name: Generate SYCL compile_commands.json
        if: steps.detect.outputs.files != ''
        run: |
          # Source oneAPI env and configure a SYCL build tree. icpx is the
          # required compiler under -Denable_sycl=true.
          set +u
          # shellcheck disable=SC1091
          source /opt/intel/oneapi/setvars.sh --force
          set -u
          CC=icx CXX=icpx meson setup build-sycl libvmaf \
            -Denable_sycl=true -Denable_cuda=false
          # Build first so codegen outputs (vcs_version.h, model JSONs → .c)
          # exist before clang-tidy parses TUs.
          # Build only the libvmaf shared library, not test binaries —
          # clang-tidy needs compile_commands.json + codegen outputs on
          # disk, but doesn't need the link step. Test linking would
          # require the libvmaf .so to be discoverable, which it isn't
          # at this point in the build (chicken-and-egg). The target name
          # under meson disambiguates by `path:type` — `vmaf` is ambiguous
          # because both a `shared_library` and a `static_library` are
          # registered under the same name; the executable lives in
          # `tools/vmaf`.
          meson compile -C build-sycl src/vmaf:shared_library
      - name: Run clang-tidy-sycl wrapper on changed files
        if: steps.detect.outputs.files != ''
        run: |
          set +u
          # shellcheck disable=SC1091
          source /opt/intel/oneapi/setvars.sh --force
          set -u
          files="${{ steps.detect.outputs.files }}"
          echo "$files" | tr ' ' '\n' | grep -v '^$' \
            | parallel -j"$(nproc)" \
                "scripts/ci/clang-tidy-sycl.sh -p build-sycl --quiet {} \
                  || touch /tmp/tidy-sycl.fail"
          [ -f /tmp/tidy-sycl.fail ] && exit 1 || exit 0

  cppcheck:
    name: Cppcheck (Whole Project)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install
        run: sudo apt-get update && sudo apt-get install -y cppcheck meson ninja-build nasm
      - name: Generate compile_commands
        run: |
          meson setup build libvmaf -Denable_cuda=false -Denable_sycl=false
          # Build first so codegen outputs (model JSONs → .c) exist on disk.
          # cppcheck parses compile_commands.json literally and errors on
          # any missing translation-unit file.
          meson compile -C build
      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,performance,portability \
            --inline-suppr \
            --suppressions-list=.cppcheck-suppressions.txt \
            --project=build/compile_commands.json \
            --error-exitcode=1 \
            --xml --output-file=cppcheck-report.xml 2>&1
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cppcheck-report
          path: cppcheck-report.xml

  python-lint:
    # T7-CI-DEDUP — mypy-only. Ruff/Black/isort already run in the
    # `pre-commit` job above (over `--all-files`), so duplicating them
    # here just doubled the maintenance surface (two pip-pin sources of
    # truth) without catching anything new. mypy stays because no
    # pre-commit hook runs it; advisory exit because numpy/torch stubs
    # are gappy on first run.
    # Job display name kept verbatim so branch-protection's required-
    # status-checks list doesn't need an admin update in lockstep with
    # this dedup. Body is mypy-only per T7-CI-DEDUP; the rename to
    # "Python Lint (mypy)" lands separately together with the
    # branch-protection change.
    name: Python Lint (Ruff + Black + isort + mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install mypy
      - run: mypy ai/ scripts/ || echo "mypy advisory only on first run"

  registry-validate:
    # T6-9 / ADR-0209 — schema + cross-file consistency check on
    # model/tiny/registry.json. Runs jsonschema (Draft 2020-12) when
    # available, plus cross-file invariants (sha256 matches, sidecars
    # exist). Fails closed.
    name: Tiny-Model Registry Validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
        with:
          # Resolve LFS blobs so the sha256 cross-check sees real ONNX
          # bytes, not pointer files.
          lfs: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install jsonschema
        run: pip install jsonschema
      - name: Validate model/tiny/registry.json
        run: python3 ai/scripts/validate_model_registry.py

  shellcheck:
    # T7-CI-DEDUP — body collapsed to a no-op proxy that depends on the
    # `pre-commit` job, which already runs `shellcheck-py v0.11.0.1` +
    # `pre-commit-shfmt v3.13.1-1` with the identical `-i 2 -ci`
    # settings over `--all-files`. The job name is kept verbatim so
    # branch-protection's required-status-checks list keeps validating
    # without an admin update in lockstep with this PR. The standalone
    # apt-install / shfmt-curl steps are dropped — pre-commit covers
    # the same surface in the same PR via the pinned hook revs.
    name: ShellCheck + shfmt (All *.sh)
    runs-on: ubuntu-latest
    timeout-minutes: 1
    needs: pre-commit
    steps:
      - run: |
          echo "shellcheck/shfmt covered by pre-commit job above; this is a no-op proxy."
