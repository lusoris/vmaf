# Static-analysis gate. Runs in parallel with the libvmaf Build Matrix so a
# lint failure doesn't block discovering build breakage and vice versa.

name: Lint & Format — Pre-Commit / Clang-Tidy / Cppcheck / Python / Shell
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: lint-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: Pre-Commit (Formatters + Basic Checks)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # Resolve LFS blobs (e.g. model/tiny/*.onnx) so pre-commit's final
          # "changes made by hooks" diff doesn't report pointer-vs-blob noise
          # against files no hook actually touched.
          lfs: true
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      # pre-commit/action@v3.0.1 is the latest release (Feb 2024) and still
      # pins actions/cache@v4, which trips the Node.js 20 deprecation
      # warning (Node 20 removed from runners 2026-09-16). Inline the
      # three steps it would have run, using actions/cache@v5.
      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: pre-commit-${{ runner.os }}-py3.12-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            pre-commit-${{ runner.os }}-py3.12-
      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit
      - name: Run pre-commit on all files
        run: pre-commit run --show-diff-on-failure --color=always --all-files

  clang-tidy:
    name: Clang-Tidy (Changed C/C++ Files)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v6
        with:
          # Need history for the push-delta diff on master. fetch-depth: 2
          # is enough for a squash-merge FF (one new commit), but use 0 to
          # tolerate multi-commit FF pushes without a second fetch step.
          fetch-depth: 0
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build nasm clang-tidy-18 \
            jq parallel
          sudo update-alternatives --install /usr/bin/clang-tidy clang-tidy \
            /usr/bin/clang-tidy-18 100
      - name: Generate compile_commands.json
        run: |
          meson setup build libvmaf -Denable_cuda=false -Denable_sycl=false
          # Build first so codegen outputs (vcs_version.h, model JSONs → .c)
          # exist on disk before clang-tidy parses the translation units.
          meson compile -C build
      - name: Run clang-tidy on changed files
        run: |
          # Collect the delta for both PR and push events so master-post-merge
          # doesn't re-scan every vendored .c/.cpp (e.g. libvmaf/src/svm.cpp)
          # and surface pre-existing warnings unrelated to the push.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(git diff --name-only \
              origin/${{ github.base_ref }}...HEAD \
              -- '*.c' '*.h' '*.cpp' '*.hpp' \
              | grep -v '^libvmaf/src/feature/arm64/' | tr '\n' ' ')
          elif [ "${{ github.event_name }}" = "push" ]; then
            before="${{ github.event.before }}"
            zero="0000000000000000000000000000000000000000"
            if [ -z "$before" ] || [ "$before" = "$zero" ]; then
              # Initial push / new branch: fall back to HEAD~1..HEAD if a
              # parent exists, otherwise skip (no meaningful delta).
              if git rev-parse HEAD~1 >/dev/null 2>&1; then
                files=$(git diff --name-only HEAD~1..HEAD \
                  -- '*.c' '*.h' '*.cpp' '*.hpp' \
                  | grep -v '^libvmaf/src/feature/arm64/' | tr '\n' ' ')
              else
                files=""
              fi
            else
              files=$(git diff --name-only "$before"..HEAD \
                -- '*.c' '*.h' '*.cpp' '*.hpp' \
                | grep -v '^libvmaf/src/feature/arm64/' | tr '\n' ' ')
            fi
          else
            # workflow_dispatch and other triggers: scan full tree (slow
            # but deliberate — operator asked for it).
            files=$(git ls-files '*.c' '*.h' '*.cpp' '*.hpp' \
              | grep -v '^subprojects/' | grep -v '^libvmaf/src/feature/arm64/' | tr '\n' ' ')
          fi
          [ -z "$files" ] && { echo "no C/C++ changes"; exit 0; }
          # Drop empty lines — the `tr '\n' ' ' | tr ' ' '\n'` round-trip
          # leaves a trailing blank that parallel would pass to clang-tidy
          # as an empty filename, which clang resolves to the workspace
          # directory and reports as a clang-diagnostic-error.
          echo "$files" | tr ' ' '\n' | grep -v '^$' \
            | parallel -j$(nproc) "clang-tidy -p build --quiet {} || touch /tmp/tidy.fail"
          [ -f /tmp/tidy.fail ] && exit 1 || exit 0

  cppcheck:
    name: Cppcheck (Whole Project)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - name: Install
        run: sudo apt-get update && sudo apt-get install -y cppcheck meson ninja-build nasm
      - name: Generate compile_commands
        run: |
          meson setup build libvmaf -Denable_cuda=false -Denable_sycl=false
          # Build first so codegen outputs (model JSONs → .c) exist on disk.
          # cppcheck parses compile_commands.json literally and errors on
          # any missing translation-unit file.
          meson compile -C build
      - name: Run cppcheck
        run: |
          cppcheck --enable=warning,performance,portability \
            --inline-suppr \
            --suppressions-list=.cppcheck-suppressions.txt \
            --project=build/compile_commands.json \
            --error-exitcode=1 \
            --xml --output-file=cppcheck-report.xml 2>&1
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: cppcheck-report
          path: cppcheck-report.xml

  python-lint:
    name: Python Lint (Ruff + Black + isort + mypy)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install
        run: pip install ruff 'black==26.3.1' isort mypy
      - run: ruff check python/ ai/ scripts/
      - run: black --check python/ ai/ scripts/
      - run: isort --check-only python/ ai/ scripts/
      - run: mypy ai/ scripts/ || echo "mypy advisory only on first run"

  shellcheck:
    name: ShellCheck + shfmt (All *.sh)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6
      - run: |
          sudo apt-get update
          sudo apt-get install -y shellcheck
          curl -sSL https://github.com/mvdan/sh/releases/download/v3.9.0/shfmt_v3.9.0_linux_amd64 \
            -o /usr/local/bin/shfmt && chmod +x /usr/local/bin/shfmt
      - run: |
          files=$(git ls-files '*.sh')
          shellcheck $files
          shfmt -d -i 2 -ci $files
