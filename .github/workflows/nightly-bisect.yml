name: nightly-bisect

# Nightly bisect-model-quality smoke (issue #4).
# Runs the binary-search regression detector against the committed
# fixture timeline. A red run means the bisect wiring broke or — once
# real models replace the synthetic placeholder — a real model quality
# regression was localised. Latest verdict + per-step table are mirrored
# to the sticky comment on issue #40.

on:
  schedule:
    - cron: "37 4 * * *"  # 04:37 UTC, after nightly.yml's 03:17 jobs settle
  workflow_dispatch:

permissions:
  contents: read
  issues: write  # for sticky-comment editing on #40

env:
  BISECT_TRACKER_ISSUE: "40"
  BISECT_GATE_PLCC: "0.85"

jobs:
  bisect:
    name: Bisect synthetic timeline
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ai/ + onnxruntime
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ai

      - name: Verify committed cache regenerates byte-for-byte
        run: python ai/scripts/build_bisect_cache.py --check

      - name: Run bisect-model-quality
        id: bisect
        run: |
          set -euo pipefail
          mkdir -p bisect-out
          vmaf-train bisect-model-quality \
            ai/testdata/bisect/models/model_*.onnx \
            --features ai/testdata/bisect/features.parquet \
            --min-plcc "${BISECT_GATE_PLCC}" \
            --input-name input \
            --json bisect-out/result.json \
            --fail-on-first-bad

      - name: Upload bisect report
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: bisect-report
          path: bisect-out/result.json

      - name: Update sticky tracker comment
        if: always() && hashFiles('bisect-out/result.json') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python scripts/ci/post-bisect-comment.py \
            --issue "${BISECT_TRACKER_ISSUE}" \
            --report bisect-out/result.json
