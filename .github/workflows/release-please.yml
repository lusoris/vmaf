# release-please — on push to master, open or update a release PR that
# (a) bumps the version per Conventional Commits, (b) regenerates CHANGELOG.md,
# and (c) when merged, tags `vX.Y.Z-lusoris.N` and fires the `release:published`
# event that supply-chain.yml keys on for signing + SBOM + SLSA.

name: release-please

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest
    # Scoped to the one job that creates release PRs / tags; the workflow
    # default stays `contents: read` so any step added later starts from
    # least-privilege (Scorecard TokenPermissionsID).
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: googleapis/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071  # v4.4.1
        id: release
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Dump outputs
        if: steps.release.outputs.release_created == 'true'
        run: |
          echo "Tag: ${{ steps.release.outputs.tag_name }}"
          echo "Version: ${{ steps.release.outputs.version }}"
