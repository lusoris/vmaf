name: libvmaf Build Matrix — Linux/macOS/Windows/ARM × CPU/SYCL/CUDA
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    # ADR-0331 — `ready_for_review` lets the per-job draft gate fire
    # CI when a draft PR is promoted to ready-for-review.
    types: [opened, synchronize, reopened, ready_for_review]
    # ADR-0341 / Research-0089 §3.2: skip the full 18-cell build matrix
    # when only documentation paths change. The Required Checks
    # Aggregator (ADR-0313) treats "workflow not reported" as
    # path-filter-skipped/acceptable, so paths-ignore at the trigger
    # level does NOT break branch protection. Mirrors the path-filter
    # structure introduced in ADR-0317 on docker-image.yml and
    # ffmpeg-integration.yml. Conservative deny-list — anything not
    # listed here (libvmaf/, meson.build, meson_options.txt,
    # subprojects/, python/, ai/, mcp-server/, model/, testdata/,
    # .github/workflows/, ...) still fires the matrix.
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
      - 'changelog.d/**'
      - 'CHANGELOG.md'
      - '.workingdir2/**'
  workflow_dispatch:

permissions:
  contents: read

# Ported from the now-deleted windows.yml (ADR-0115). Cancels superseded
# runs on the same ref so a force-push doesn't queue duplicate matrix runs.
concurrency:
  group: libvmaf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  # ===== Linux / macOS / ARM builds =====
  libvmaf-build:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- CPU-only builds ---
          - os: ubuntu-latest
            CC: ccache gcc
            CXX: ccache g++
            name: Build — Ubuntu gcc (CPU)
          - os: ubuntu-latest
            CC: ccache clang
            CXX: ccache clang++
            name: Build — Ubuntu clang (CPU)
          - os: macos-latest
            CC: ccache clang
            CXX: ccache clang++
            name: Build — macOS clang (CPU)
            experimental: true
          - os: ubuntu-24.04-arm
            CC: ccache clang
            CXX: ccache clang++
            name: Build — Ubuntu ARM clang (CPU)

          # --- i686 (32-bit x86) build — reproduces Netflix#1481 ---
          # Verifies libvmaf still compiles on 32-bit x86 with
          # -Denable_asm=false. The documented workaround for the
          # `_mm256_extract_epi64` implicit-declaration failure on
          # 32-bit x86 is to disable the asm path; this job pins
          # that contract so any future 32-bit-only regression trips
          # the matrix. Tests are skipped (meson cross-build marks
          # them SKIP 77 — host can run i686 binaries natively but
          # meson doesn't know that). See ADR-0151.
          - os: ubuntu-latest
            CC: ccache gcc
            CXX: ccache g++
            i686: true
            meson_extra: --cross-file=build-aux/i686-linux-gnu.ini -Denable_asm=false
            name: Build — Ubuntu i686 gcc (CPU, no-asm)

          # --- DNN-enabled builds (ADR-0120) ---
          # Build with -Denable_dnn=enabled across compiler/OS combinations
          # to ensure the ORT C-API surface compiles on every CPU leg, not
          # only the dedicated `Tiny AI` job. Each leg installs ONNX Runtime
          # (Linux: MS tarball pinned to 1.22.0; macOS: Homebrew) and runs
          # the meson dnn suite. macOS leg stays `experimental: true` so a
          # Homebrew ORT bump that breaks ABI doesn't block merge.
          - os: ubuntu-latest
            CC: ccache gcc
            CXX: ccache g++
            dnn: true
            meson_extra: -Denable_dnn=enabled
            name: Build — Ubuntu gcc (CPU) + DNN
          - os: ubuntu-latest
            CC: ccache clang
            CXX: ccache clang++
            dnn: true
            meson_extra: -Denable_dnn=enabled
            name: Build — Ubuntu clang (CPU) + DNN
          - os: macos-latest
            CC: ccache clang
            CXX: ccache clang++
            dnn: true
            meson_extra: -Denable_dnn=enabled
            name: Build — macOS clang (CPU) + DNN
            experimental: true

          # --- Vulkan T5-1b runtime (ADR-0175) ---
          # Real volk + VMA + glslc + compute dispatch. Needs the
          # Vulkan loader + headers + glslc shader compiler before
          # meson setup; lavapipe is the software ICD that exposes
          # a compute-capable VkPhysicalDevice on headless runners
          # so the smoke test can run end-to-end. Wraps for volk +
          # VMA are sha256-pinned in libvmaf/subprojects/.
          - os: ubuntu-latest
            CC: ccache gcc
            CXX: ccache g++
            vulkan: true
            meson_extra: -Denable_vulkan=enabled
            name: Build — Ubuntu Vulkan (T5-1b runtime)

          # --- macOS Vulkan via MoltenVK (ADR-0338, advisory) ---
          # Validates the MoltenVK passthrough route on Apple
          # Silicon: brew installs `molten-vk` (the Vulkan-on-Metal
          # translation layer ICD) plus the Khronos `vulkan-loader`
          # and `vulkan-headers`. `VK_ICD_FILENAMES` points the
          # loader at MoltenVK's `MoltenVK_icd.json` so the loader
          # enumerates exactly one ICD (Apple GPU via Metal). The
          # smoke test pins the runtime contract; the cross-backend
          # gate runs at `places=4` to confirm shader correctness.
          #
          # `experimental: true` + `continue-on-error` mark the lane
          # advisory until one green run on master, per ADR-0338.
          # Primary risk: `moment.comp` uses
          # `GL_EXT_shader_atomic_int64` (atomicAdd on int64), which
          # MoltenVK maps to Metal Tier-2 argument buffers — well-
          # supported on M1+ but the most fragile dependency. Other
          # shaders only use non-atomic int64 arithmetic
          # (`GL_EXT_shader_explicit_arithmetic_types_int64`) which
          # lowers to native Metal `long` and should pass.
          - os: macos-latest
            CC: ccache clang
            CXX: ccache clang++
            moltenvk: true
            meson_extra: -Denable_vulkan=enabled
            experimental: true
            name: Build — macOS Vulkan via MoltenVK (advisory)

          # --- HIP T7-10 scaffold (ADR-0209) ---
          # Stub-only build — every HIP entry point returns -ENOSYS until
          # the runtime PR lands. No ROCm SDK is installed; the scaffold's
          # `dependency('hip-lang', required: false)` probe is silently
          # absent on a stock Ubuntu runner and the build still succeeds.
          # The smoke test runs (no real GPU needed — every assertion
          # checks the -ENOSYS / -EINVAL contract).
          - os: ubuntu-latest
            CC: ccache gcc
            CXX: ccache g++
            meson_extra: -Denable_hip=true
            name: Build — Ubuntu HIP (T7-10 scaffold)

          # --- Static library builds ---
          - os: ubuntu-latest
            CC: ccache gcc
            CXX: ccache g++
            meson_extra: --default-library static
            name: Build — Ubuntu gcc Static (CPU)
          # T7-CI-DEDUP — `Build — Ubuntu SYCL Static` removed. The
          # dynamic-link `Build — Ubuntu SYCL` lane below already
          # proves the icx / icpx + meson contract for the SYCL
          # device-image link path; the static lane was a packaging
          # exercise (no new bug class — every regression class it
          # could catch shows up first on the dynamic lane). The
          # CUDA Static lane stays because it exercises a distinct
          # NVCC-static interaction not covered by the dynamic build.
          - os: ubuntu-latest
            CC: ccache gcc
            CXX: ccache g++
            cuda: true
            meson_extra: --default-library static -Denable_cuda=true -Denable_nvcc=true
            name: Build — Ubuntu CUDA Static

          # --- SYCL build (icpx for both host + SYCL sources so the device
          #     image is registered at the .so link step; see post-T7-8
          #     SYCL revival in libvmaf/src/meson.build) ---
          - os: ubuntu-latest
            CC: icx
            CXX: icpx
            sycl: true
            meson_extra: -Denable_sycl=true -Db_lto=false
            name: Build — Ubuntu SYCL

          # --- CUDA build (gcc + nvcc) ---
          - os: ubuntu-latest
            CC: ccache gcc
            CXX: ccache g++
            cuda: true
            meson_extra: -Denable_cuda=true -Denable_nvcc=true
            name: Build — Ubuntu CUDA

          # --- SYCL + CUDA combined (icpx host so SYCL link works; nvcc
          #     handles the CUDA TUs separately via -Denable_nvcc=true) ---
          - os: ubuntu-latest
            CC: icx
            CXX: icpx
            sycl: true
            cuda: true
            meson_extra: -Denable_sycl=true -Denable_cuda=true -Denable_nvcc=true -Db_lto=false
            name: Build — Ubuntu SYCL + CUDA

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    # ADR-0338: macOS Vulkan-via-MoltenVK lane is advisory until one
    # green run on master. Other matrix entries default to
    # `continue-on-error: false`. The `|| false` coalesce keeps any
    # non-`moltenvk` row strict.
    continue-on-error: ${{ matrix.experimental == true && matrix.moltenvk == true }}
    env:
      CC: ${{ matrix.CC }}
      CXX: ${{ matrix.CXX }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      # ---------- ccache persistence (Research-0089 §3.1) ----------
      # Linux + macOS build legs all wrap their host compiler in `ccache`
      # (matrix.CC = "ccache gcc" / "ccache clang"). Without a persisted
      # `~/.ccache` directory every PR cold-rebuilds; per Research-0089
      # the typical hit rate after warm-up is 60–85% and the wall-clock
      # saving is ~3–5 min/cell. Only the SYCL legs run a bare icx/icpx
      # without the ccache wrapper, so skip those; matrix.CC starts with
      # "ccache" on every other lane.
      #
      # Cache key + path shape follows the official GitHub Actions
      # `actions/cache` cross-platform recipe — `~/.ccache` is ccache's
      # default cache dir on Linux + macOS, and per-OS / per-compiler
      # keying with restore-key fall-through is the documented pattern
      # for build caches that vary by toolchain. See
      # https://github.com/actions/cache (accessed 2026-05-09) and
      # https://github.com/actions/cache/blob/main/examples.md (same date)
      # — "C++ - ccache" example.
      - name: Restore ccache (Linux + macOS)
        if: startsWith(matrix.CC, 'ccache ')
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: ~/.ccache
          key: ccache-${{ matrix.os }}-${{ matrix.CC }}-${{ matrix.meson_extra }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ matrix.os }}-${{ matrix.CC }}-${{ matrix.meson_extra }}-
            ccache-${{ matrix.os }}-${{ matrix.CC }}-
            ccache-${{ matrix.os }}-

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: 3.11

      - name: Install meson and ninja
        run: |
          python -m pip install --upgrade pip
          pip install meson

      - name: Install dependencies (ubuntu)
        if: startsWith(matrix.os, 'ubuntu') && !matrix.sycl && !matrix.cuda && !matrix.i686
        run: |
          sudo apt-get update
          sudo -E apt-get -yq install ccache ninja-build nasm libomp-dev pkg-config
          case "$CC" in
          *gcc)   sudo -E apt-get -yq install gcc g++ ;;
          *clang) sudo -E apt-get -yq install clang ;;
          esac

      - name: Install dependencies (ubuntu i686)
        if: matrix.i686
        run: |
          sudo dpkg --add-architecture i386
          sudo apt-get update
          sudo -E apt-get -yq install ccache ninja-build pkg-config \
            gcc g++ gcc-multilib g++-multilib

      - name: Install dependencies (mac)
        if: matrix.os == 'macos-latest'
        run: |
          brew install -q ninja nasm ccache llvm pkg-config

      # ---------- ONNX Runtime (DNN legs only) ----------
      # Mirrors the install pattern from the dedicated Tiny AI job in
      # tests-and-quality-gates.yml so DNN-on builds across compilers /
      # OSes share the same pinned ORT version. See ADR-0120.
      - name: Install ONNX Runtime (linux, DNN leg)
        if: matrix.dnn && startsWith(matrix.os, 'ubuntu')
        env:
          ORT_VERSION: "1.22.0"
        run: |
          curl -sSL \
            "https://github.com/microsoft/onnxruntime/releases/download/v${ORT_VERSION}/onnxruntime-linux-x64-${ORT_VERSION}.tgz" \
            | sudo tar -xz -C /opt/
          sudo ln -sfn "/opt/onnxruntime-linux-x64-${ORT_VERSION}" /opt/onnxruntime
          sudo install -d /usr/local/lib/pkgconfig
          cat <<EOF | sudo tee /usr/local/lib/pkgconfig/libonnxruntime.pc >/dev/null
          prefix=/opt/onnxruntime
          exec_prefix=\${prefix}
          libdir=\${exec_prefix}/lib
          includedir=\${prefix}/include

          Name: libonnxruntime
          Description: ONNX Runtime C API
          Version: ${ORT_VERSION}
          Libs: -L\${libdir} -lonnxruntime
          Cflags: -I\${includedir}
          EOF
          sudo sed -i 's/^          //' /usr/local/lib/pkgconfig/libonnxruntime.pc
          echo "/opt/onnxruntime/lib" | sudo tee /etc/ld.so.conf.d/onnxruntime.conf
          sudo ldconfig

      - name: Install ONNX Runtime (macos, DNN leg)
        if: matrix.dnn && matrix.os == 'macos-latest'
        run: |
          # Homebrew ships onnxruntime as a keg-only formula with its own
          # libonnxruntime.pc. Make pkg-config see it.
          brew install -q onnxruntime
          ORT_PREFIX=$(brew --prefix onnxruntime)
          echo "PKG_CONFIG_PATH=${ORT_PREFIX}/lib/pkgconfig" >> $GITHUB_ENV

      # ---------- Intel oneAPI (SYCL) ----------
      # Pinned to oneAPI 2025.3 (icpx 2025.3.x) and Level Zero v1.28.0.
      # 2025.0 was an ABI-breaking release, so pin to the 2025.3 minor meta
      # package rather than the unversioned 'latest' to avoid silent bumps.
      - name: Install Intel oneAPI
        if: matrix.sycl
        # Override the matrix-level CC=icx / CXX=icpx for *this* step only:
        # the Level Zero loader is plain C and we don't have icx on PATH yet
        # at this point in the same step (apt installs it below, then the
        # cmake invocation runs before the next step picks up GITHUB_PATH).
        # Force gcc here; the meson setup step further down picks up icpx
        # via the matrix env once setvars.sh adds /opt/intel/oneapi/compiler
        # to PATH.
        env:
          CC: gcc
          CXX: g++
        run: |
          sudo apt-get update
          sudo -E apt-get -yq install ccache ninja-build nasm gcc g++ gpg-agent
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | sudo gpg --dearmor -o /usr/share/keyrings/oneapi-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo -E apt-get -yq install intel-oneapi-compiler-dpcpp-cpp-2025.3 cmake
          # Level Zero headers + loader library, pinned to stable tag.
          git clone --depth=1 --branch v1.28.0 \
            https://github.com/oneapi-src/level-zero.git /tmp/level-zero
          cmake -S /tmp/level-zero -B /tmp/level-zero/build -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build /tmp/level-zero/build -j$(nproc)
          sudo cmake --install /tmp/level-zero/build
          rm -rf /tmp/level-zero
          echo "/opt/intel/oneapi/compiler/latest/bin" >> $GITHUB_PATH
          echo "/opt/intel/oneapi/compiler/latest/lib" | sudo tee /etc/ld.so.conf.d/oneapi.conf
          sudo ldconfig

      # ---------- CUDA toolkit ----------
      # Pinned to CUDA 13.0.0 (released 2025-08-04). 13.0 drops sm_50/60/70
      # (Maxwell/Pascal/Volta); meson.build already guards the sm_50 gencode
      # with a `<13` version check. Minimum driver for 13.x is >= 580.
      - name: Install CUDA toolkit
        if: matrix.cuda
        uses: Jimver/cuda-toolkit@3d45d157f327c09c04b50ee6ccdea2d9d017ec76  # v0.2.35
        with:
          cuda: '13.0.0'
          method: network
          sub-packages: '["nvcc", "cudart-dev"]'

      - name: Install nv-codec-headers
        if: matrix.cuda
        run: |
          git clone --depth=1 https://code.ffmpeg.org/FFmpeg/nv-codec-headers
          cd nv-codec-headers && sudo make install && cd .. && rm -rf nv-codec-headers

      - name: Install base deps for CUDA-only builds
        if: matrix.cuda && !matrix.sycl
        run: |
          sudo apt-get update
          sudo -E apt-get -yq install ccache ninja-build nasm gcc g++

      # ---------- Vulkan SDK (T5-1b runtime) ----------
      # libvulkan.so + vulkan-headers + glslc + lavapipe (software
      # ICD so the headless runner can enumerate a compute-capable
      # VkPhysicalDevice). volk + VMA come via meson wraps in
      # libvmaf/subprojects/ — no apt package needed.
      #
      # Cache the meson `subprojects/packagecache/` so volk + VMA wrap
      # archives (sha256-pinned, fetched from GitHub releases on every
      # run today) are restored from the GHA cache instead. Key is the
      # `.wrap` file hashes — wrap revisions are sha256-pinned, so the
      # cached archives are immutable per (volk-version, vma-version)
      # pair. Per Research-0089 (PR #525) §2, Vulkan build p50 is
      # 10.43 min; the wrap fetches contribute ~15–30 s of that on a
      # cold runner.
      - name: Cache meson subprojects (Vulkan wraps)
        if: matrix.vulkan
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: libvmaf/subprojects/packagecache
          key: meson-packagecache-vulkan-${{ hashFiles('libvmaf/subprojects/*.wrap') }}
          restore-keys: |
            meson-packagecache-vulkan-
      - name: Install Vulkan SDK
        if: matrix.vulkan
        run: |
          sudo apt-get update
          sudo -E apt-get -yq install ccache ninja-build nasm gcc g++ \
            libvulkan-dev vulkan-tools glslang-tools mesa-vulkan-drivers
          # `glslang-tools` ships glslangValidator; the wrap pipeline
          # uses `glslc` from `glslc` package or shaderc-compiler.
          # Try shaderc; fall back to a build-from-source path if the
          # apt name has changed.
          if ! command -v glslc >/dev/null; then
            sudo -E apt-get -yq install glslc || \
              sudo -E apt-get -yq install vulkan-sdk
          fi
          glslc --version | head -2
          vulkaninfo --summary || true

      # ---------- MoltenVK + Vulkan loader/headers (macOS lane) ----------
      # Apple Silicon GHA runners (`macos-latest`) ship with no Vulkan
      # ICD by default — Metal is the native API. This step installs:
      #   - `molten-vk`     — Vulkan-on-Metal translation ICD; lays
      #                       MoltenVK_icd.json under
      #                       /opt/homebrew/etc/vulkan/icd.d/ per the
      #                       homebrew formula's install layout
      #                       (see ADR-0338 and docs/backends/vulkan/moltenvk.md).
      #   - `vulkan-loader` — Khronos `libvulkan.dylib`; volk dlopen()s
      #                       this at runtime.
      #   - `vulkan-headers`— `vulkan/vulkan.h` etc., consumed by the
      #                       libvmaf build's wrap-fallback path.
      #   - `glslc`         — GLSL → SPIR-V compiler (ships with
      #                       `shaderc`).
      # `VK_ICD_FILENAMES` pins the loader to MoltenVK so the lane is
      # deterministic regardless of any future homebrew default-ICD
      # changes. `vulkaninfo --summary` proves the Apple GPU is the
      # device the loader sees (output captured to stdout for triage).
      - name: Install MoltenVK + Vulkan loader/headers (macOS)
        if: matrix.moltenvk
        run: |
          brew install -q molten-vk vulkan-loader vulkan-headers shaderc
          BREW_PREFIX=$(brew --prefix)
          ICD_JSON="${BREW_PREFIX}/etc/vulkan/icd.d/MoltenVK_icd.json"
          if [ ! -f "${ICD_JSON}" ]; then
            echo "::error::MoltenVK_icd.json not found at ${ICD_JSON}"
            ls -la "${BREW_PREFIX}/etc/vulkan/icd.d/" || true
            ls -la "${BREW_PREFIX}/share/vulkan/icd.d/" || true
            exit 1
          fi
          echo "VK_ICD_FILENAMES=${ICD_JSON}" >> $GITHUB_ENV
          # Make libvulkan.dylib + glslc visible to meson / volk dlopen.
          echo "DYLD_LIBRARY_PATH=${BREW_PREFIX}/lib:${DYLD_LIBRARY_PATH:-}" >> $GITHUB_ENV
          echo "PKG_CONFIG_PATH=${BREW_PREFIX}/lib/pkgconfig:${PKG_CONFIG_PATH:-}" >> $GITHUB_ENV
          # Sanity: confirm MoltenVK is the loaded ICD. `|| true`
          # because vulkaninfo non-zero-exits on some macOS warning
          # paths even when enumeration succeeds; the grep below is
          # the actual gate.
          vulkaninfo --summary 2>&1 | tee /tmp/vulkaninfo.txt || true
          if ! grep -qi 'MoltenVK\|Apple' /tmp/vulkaninfo.txt; then
            echo "::warning::vulkaninfo did not report MoltenVK/Apple GPU — see /tmp/vulkaninfo.txt"
          fi
          glslc --version | head -2

      # ---------- Configure ccache cap + stats reset ----------
      # ccache dir is restored above by `actions/cache`; size-cap it so
      # stale objects evict in LRU order rather than the cache growing
      # without bound across runs (the hosted runner has a hard 10 GB
      # cache budget per repo; we want headroom for fixture caches too).
      # `ccache -z` zeroes the stats so the post-build `ccache -s` shows
      # only this run's hit/miss counts. See
      # https://ccache.dev/manual/latest.html#_configuration (accessed
      # 2026-05-09) for `max_size` semantics.
      - name: Configure ccache
        if: startsWith(matrix.CC, 'ccache ')
        run: |
          mkdir -p ~/.ccache
          ccache --max-size=400M
          ccache -z

      # ---------- Build ----------
      - name: Configure libvmaf
        run: |
          # SYCL build needs setvars.sh on PATH/LD_LIBRARY_PATH so meson
          # can probe libsycl + level-zero headers via icpx -fsycl. CPU
          # / CUDA matrix entries skip this — they don't have setvars.sh.
          if [ "${{ matrix.sycl }}" = "true" ]; then
            source /opt/intel/oneapi/setvars.sh
          fi
          meson setup libvmaf libvmaf/build --buildtype release \
            --prefix $PWD/install \
            -Denable_float=true \
            ${{ matrix.meson_extra }}

      - name: Build libvmaf
        run: |
          if [ "${{ matrix.sycl }}" = "true" ]; then
            source /opt/intel/oneapi/setvars.sh
          fi
          sudo -E PATH="$PATH" LD_LIBRARY_PATH="$LD_LIBRARY_PATH" \
            ninja -vC libvmaf/build install

      # Surface ccache hit/miss counters in the CI log so the savings
      # claim from Research-0089 §3.1 can be verified per-run. Runs
      # whether the build succeeds or fails (always()) so a failed
      # build still reports whether ccache was warming up.
      - name: Report ccache statistics
        if: always() && startsWith(matrix.CC, 'ccache ')
        run: ccache -s

      # Verify pkgconfig for static linking
      - name: Verify static pkgconfig
        if: contains(matrix.meson_extra, 'static')
        run: |
          export PKG_CONFIG_PATH=$PWD/install/lib/pkgconfig:$PWD/install/lib/x86_64-linux-gnu/pkgconfig
          echo "=== libvmaf.pc ==="
          cat $PWD/install/lib/pkgconfig/libvmaf.pc || cat $PWD/install/lib/x86_64-linux-gnu/pkgconfig/libvmaf.pc
          echo ""
          echo "=== pkg-config --static --libs libvmaf ==="
          pkg-config --static --libs libvmaf
          # Static libs must include -lpthread and -lm
          pkg-config --static --libs libvmaf | grep -q '\-lpthread\|\-pthread'
          pkg-config --static --libs libvmaf | grep -q '\-lm'

      # DNN legs: run the dedicated dnn suite first so its logs are easy
      # to find if the build regresses ORT compatibility. The full test
      # run below also exercises dnn via `ninja test`; this step exists
      # for log isolation only.
      - name: Run meson dnn suite (DNN leg)
        if: matrix.dnn
        # `sudo $(which meson)` resolves the meson absolute path before
        # sudo strips PATH — pip-installed meson lives under the runner
        # user's $HOME so a bare `sudo meson` reports "command not found".
        # Sudo is needed because the preceding `sudo ninja install` step
        # left build artifacts owned by root.
        run: sudo $(which meson) test -C libvmaf/build --suite=dnn --print-errorlogs

      # CPU-only: full test suite + tox (skipped for i686 cross-build
      # because meson marks cross-compiled tests SKIP 77 regardless of
      # whether the host can actually run them; the build itself is
      # what Netflix#1481 needs to pin).
      - name: Run tests
        if: "!matrix.sycl && !matrix.cuda && !matrix.i686 && !matrix.moltenvk"
        run: sudo ninja -vC libvmaf/build test

      # ---------- Vulkan smoke test (macOS MoltenVK lane) ----------
      # Runs ONLY the Vulkan-tagged smoke binaries and captures the
      # ICD enumeration output for triage. Per ADR-0338 the lane is
      # advisory: a kernel-pipeline failure (e.g. a SPIR-V capability
      # MoltenVK rejects) is a known limitation, not a merge blocker.
      # The failure mode + suspected MoltenVK gap are documented in
      # docs/backends/vulkan/moltenvk.md "Known limitations".
      #
      # No `sudo` here — macOS brew installs run as the runner user,
      # so the build artifacts are user-owned. `meson test --suite`
      # filters to the Vulkan suite (registered in
      # libvmaf/test/meson.build alongside the other suite labels).
      - name: Run Vulkan smoke tests (macOS MoltenVK)
        if: matrix.moltenvk
        run: |
          set +e
          echo "=== Loaded ICD ==="
          vulkaninfo --summary 2>&1 | head -80 || true
          echo ""
          echo "=== test_vulkan_smoke ==="
          ./libvmaf/build/test/test_vulkan_smoke
          smoke_rc=$?
          echo "=== test_vulkan_pic_preallocation ==="
          ./libvmaf/build/test/test_vulkan_pic_preallocation
          prealloc_rc=$?
          echo "=== test_vulkan_async_pending_fence ==="
          ./libvmaf/build/test/test_vulkan_async_pending_fence
          fence_rc=$?
          echo ""
          echo "smoke_rc=${smoke_rc} prealloc_rc=${prealloc_rc} fence_rc=${fence_rc}"
          # Report any non-zero rc as advisory failure (lane is
          # `continue-on-error: true` until one green run on master).
          if [ ${smoke_rc} -ne 0 ] || [ ${prealloc_rc} -ne 0 ] || [ ${fence_rc} -ne 0 ]; then
            echo "::warning::MoltenVK Vulkan smoke surfaced failures — see docs/backends/vulkan/moltenvk.md for the known-limitations matrix."
            exit 1
          fi

      - name: Cache Netflix vmaf_resource fixtures
        # Insulates the tox lanes from the recurring HTTP-502s on
        # raw.githubusercontent.com when fetching python/test/resource/
        # fixtures via download_reactively (python/vmaf/config.py).
        if: "((startsWith(matrix.os, 'ubuntu') && !matrix.sycl && !matrix.cuda && !matrix.i686) || matrix.os == 'macos-latest') && !matrix.moltenvk"
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: python/test/resource
          key: vmaf-fixtures-resource-v1-${{ hashFiles('python/test/*_test.py', 'python/test/resource/test_*.py') }}
          restore-keys: |
            vmaf-fixtures-resource-v1-
            vmaf-fixtures-resource-

      - name: Run tox tests (ubuntu)
        if: "startsWith(matrix.os, 'ubuntu') && !matrix.sycl && !matrix.cuda && !matrix.i686"
        run: |
          mkdir -p ~/.ccache && sudo chown -R $(whoami) ~/.ccache
          pip install tox
          tox -c python

      - name: Run tox tests (mac)
        if: matrix.os == 'macos-latest' && !matrix.moltenvk
        run: |
          mkdir -p ~/.ccache && sudo chown -R $(whoami) ~/.ccache
          pip install tox
          PATH=$(brew --prefix)/opt/llvm/bin:$PATH \
          CC=$(brew --prefix)/opt/llvm/bin/clang \
          CXX=$(brew --prefix)/opt/llvm/bin/clang++ \
          tox -c python

      # GPU builds: run tests that don't need hardware
      - name: Run CPU-only tests (GPU build)
        if: matrix.sycl || matrix.cuda
        run: |
          cd libvmaf/build
          for t in test_dict test_ref test_log test_thread_pool test_cpu \
                   test_feature test_cli_parse test_model test_predict \
                   test_ciede test_cambi test_psnr test_luminance_tools \
                   test_feature_collector test_framesync; do
            echo "=== $t ==="
            ./test/$t
          done

      # ---------- Artifacts ----------
      - name: Upload vmaf binary
        if: "!contains(matrix.meson_extra, 'static')"
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.name }}-vmaf
          path: ./install/bin/vmaf

  # ===== Windows (MSYS2 / MinGW-w64) =====
  # Folded in from the now-deleted .github/workflows/windows.yml so the
  # full build matrix lives in one workflow file. See ADR-0115.
  # MINGW32 is intentionally disabled (vmaf score mismatch — upstream note);
  # 32-bit support would need a SIMD audit before re-enabling.
  #
  # Job key renamed `build` → `windows` and display name set to Title Case
  # per ADR-0116. The matrix-expanded required status check on master is
  # re-pinned to `Build — Windows MinGW64 (CPU)` immediately after this
  # workflow lands (see ADR-0116 §Consequences).
  windows:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: Build — Windows MinGW64 (CPU)
    runs-on: windows-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          # - msystem: MINGW32
          #   MINGW_PACKAGE_PREFIX: mingw-w64-i686
          #   CFLAGS: -msse2 -mfpmath=sse -mstackrealign
          - msystem: MINGW64
            MINGW_PACKAGE_PREFIX: mingw-w64-x86_64
    env:
      CC: ccache gcc
      CXX: ccache g++
      CFLAGS: -pipe -static -O3 -mtune=generic -D_FILE_OFFSET_BITS=64 -mthreads
      CXXFLAGS: -pipe -static -O3 -mtune=generic -D_FILE_OFFSET_BITS=64 -mthreads
      LDFLAGS: -pipe -static -static-libgcc -static-libstdc++
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Cache ccache files
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae  # v5.0.5
        with:
          path: .ccache
          key: ${{ runner.os }}-${{ matrix.msystem }}-0-${{ hashFiles('**/*.c') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.msystem }}-0-
            ${{ runner.os }}-${{ matrix.msystem }}-

      - uses: msys2/setup-msys2@e9898307ac31d1a803454791be09ab9973336e1c  # v2.31.1
        with:
          msystem: ${{ matrix.msystem }}
          install: >-
            ${{ matrix.MINGW_PACKAGE_PREFIX }}-ccache
            ${{ matrix.MINGW_PACKAGE_PREFIX }}-nasm
            ${{ matrix.MINGW_PACKAGE_PREFIX }}-pkg-config
            ${{ matrix.MINGW_PACKAGE_PREFIX }}-gcc
            ${{ matrix.MINGW_PACKAGE_PREFIX }}-meson
            ${{ matrix.MINGW_PACKAGE_PREFIX }}-ninja
            vim make diffutils
          update: true
          path-type: inherit

      - name: Set ccache dir
        run: echo "CCACHE_DIR=$PWD/.ccache" >> $GITHUB_ENV

      - name: Configure vmaf
        run: |
          meson setup libvmaf libvmaf/build --buildtype release \
            --default-library static --prefix "$MINGW_PREFIX" \
            -Denable_cuda=false -Denable_sycl=false -Denable_float=true

      - name: Build vmaf
        run: meson install -C libvmaf/build

      - name: Test vmaf
        # --print-errorlogs surfaces the failing test's stdout/stderr
        # inline in the CI log instead of only writing it to
        # meson-logs/testlog.txt, so cross-platform debugging (e.g.
        # MinGW64-specific locale assertions) does not require an
        # artifact round-trip.
        run: meson test -C libvmaf/build --num-processes $(nproc) --print-errorlogs

      - name: Show binary info and stage artifact
        id: stage
        run: |
          ldd "$MINGW_PREFIX/bin/vmaf.exe" || true
          mkdir -p artifact
          cp "$MINGW_PREFIX/bin/vmaf.exe" artifact/vmaf.exe
          echo "path=$(cygpath -m "$PWD/artifact/vmaf.exe")" >> "$GITHUB_OUTPUT"

      - name: Upload vmaf.exe artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: ${{ matrix.msystem }}-vmaf
          path: ${{ steps.stage.outputs.path }}
          if-no-files-found: error

  # ===== Windows GPU build-only (MSVC + CUDA, MSVC + oneAPI SYCL) =====
  # Build-only legs — no GPU on the windows-latest runner, so the test
  # step is intentionally omitted. The point is verifying that the
  # CUDA / SYCL backend code compiles & links on the MSVC toolchain,
  # closing the platform-coverage hole left by the Linux-only GPU
  # matrix entries above. See ADR-0121.
  #
  # MSVC env is set up via ilammy/msvc-dev-cmd@v1 (community-standard
  # action that runs `vcvars64.bat` and exports the variables).
  # CUDA toolkit comes from Jimver/cuda-toolkit (same action used by
  # the Linux CUDA legs, pinned to the same 13.0.0 release for parity).
  # oneAPI is installed via the official `oneapi-src/oneapi-ci`
  # offline-installer pattern (`curl` the Base Toolkit installer +
  # extract + run bootstrapper). We tried `rscohn2/setup-oneapi@v0`
  # first (Linux-only — all install URLs `.sh`) and Chocolatey's
  # `intel-oneapi-basekit` (not on the community feed); neither
  # works on `windows-latest`. Pinned to oneAPI 2025.3.0.372 to
  # match the Linux SYCL leg's `intel-oneapi-compiler-dpcpp-cpp-2025.3`.
  # Both legs additionally inject `/experimental:c11atomics` into
  # `CFLAGS` / `CXXFLAGS` because libvmaf uses C11 atomics that
  # MSVC's `<stdatomic.h>` refuses without that flag.
  #
  # The two job names are pinned to required status checks on master
  # immediately after merge (see ADR-0121 §Consequences).
  windows-gpu-build:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: ${{ matrix.name }}
    runs-on: windows-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          # --default-library=static: libvmaf has no __declspec(dllexport)
          # on its public API (upstream is POSIX-shaped), so a vanilla MSVC
          # shared build produces an empty import lib and the tool targets
          # fail with LNK1181. Mirrors the MinGW leg's `--default-library
          # static` at line 387. Also lets the vmaf CLI pick the static
          # archive via libvmaf/tools/meson.build:26 without the
          # get_shared_lib() branch.
          - backend: cuda
            meson_extra: --default-library=static -Denable_cuda=true -Denable_nvcc=true -Denable_sycl=false
            name: Build — Windows MSVC + CUDA (build only)
          - backend: sycl
            meson_extra: --default-library=static -Denable_cuda=false -Denable_sycl=true
            name: Build — Windows MSVC + oneAPI SYCL (build only)
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 1

      - name: Setup python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.11'

      - name: Install meson and ninja
        run: |
          python -m pip install --upgrade pip
          pip install meson ninja

      # ---------- MSVC dev environment ----------
      # Exports cl.exe + the rest of the MSVC toolchain into PATH /
      # INCLUDE / LIB. Required by both backends (CUDA's nvcc shells
      # out to cl.exe; oneAPI's icx-cl wraps cl.exe).
      - name: Setup MSVC dev environment
        uses: ilammy/msvc-dev-cmd@0b201ec74fa43914dc39ae48a89fd1d8cb592756  # v1.13.0

      # ---------- CUDA toolkit (CUDA leg only) ----------
      # Same pin as the Linux CUDA legs: CUDA 13.0.0, Maxwell/Pascal/Volta
      # gencodes dropped (meson.build already guards the sm_50 emit on
      # `version < 13`).
      - name: Install CUDA toolkit (windows)
        if: matrix.backend == 'cuda'
        uses: Jimver/cuda-toolkit@3d45d157f327c09c04b50ee6ccdea2d9d017ec76  # v0.2.35
        with:
          cuda: '13.0.0'
          method: network
          # Persist the CUDA installer payload (~3 GB on Windows) in
          # the GHA cache between runs. Default behavior re-downloads
          # the network installer on every job — Research-0089 (PR
          # #525) §2 puts the Windows MSVC + CUDA build at p50 = 10.91
          # min, of which the CUDA install dominates. With the cache,
          # the action restores the payload from `~/cuda_install_*`
          # and skips the network leg. Pin matches the Linux legs.
          use-github-cache: true
          use-local-cache: false
          # Windows sub-package names per
          # https://docs.nvidia.com/cuda/cuda-installation-guide-microsoft-windows/index.html#install-cuda-software
          # — the action appends `_<major>.<minor>` to each entry, so
          # `nvcc` → `nvcc_13.0`, etc. `cudart_dev` is Linux-Debian
          # naming and is rejected by the Windows installer; the
          # runtime dev headers ship with `cudart` on Windows.
          # `crt` ships `crt/host_config.h` (CUDA Runtime Library
          # compile-time headers); without it `cuda_runtime.h` errors
          # with "Cannot open include file: 'crt/host_config.h'".
          # NOTE: `cuda_cccl` looks like the right name on first read
          # of the docs but is NOT a valid Windows sub-package name
          # in CUDA 13.x — the installer rejects it with exit code
          # 0xE0E07F19 (invalid package). The Windows CUDA Runtime
          # ships these headers under the standalone `crt` sub-package
          # per the CUDA Windows install guide.
          # `nvvm` ships `nvvm/bin/cicc.exe` (CUDA LLVM-based device
          # compiler) + `nvvm/libdevice/libdevice.*.bc`. Without it
          # the `nvcc` driver spawns `cicc.exe` → "The system cannot
          # find the path specified." at the .cu → PTX stage, even
          # for an empty kernel. Verified locally (Windows Server
          # 2022 VM, CUDA 13.0.48) 2026-04-19 — see ADR-0121.
          sub-packages: '["nvcc", "cudart", "crt", "nvvm", "visual_studio_integration"]'

      # ---------- Intel oneAPI (SYCL leg only) ----------
      # Mirrors the official `oneapi-src/oneapi-ci` install pattern
      # (`scripts/install_windows.bat`): curl the offline Base
      # Toolkit installer, extract its bootstrapper, run with
      # `--components=intel.oneapi.win.cpp-dpcpp-common --eula=accept`
      # plus `NEED_VS*_INTEGRATION=0` so we skip the (very slow) VS
      # IDE plug-in steps. Pinned to oneAPI 2025.3 to match the
      # Linux SYCL leg's `intel-oneapi-compiler-dpcpp-cpp-2025.3`.
      # Chocolatey was tried first but `intel-oneapi-basekit` is
      # not on the community feed (verified 2026-04-19).
      - name: Install Intel oneAPI (windows)
        if: matrix.backend == 'sycl'
        shell: cmd
        env:
          WINDOWS_BASEKIT_URL: https://registrationcenter-download.intel.com/akdlm/IRC_NAS/1f18901e-877d-469d-a41a-a10f11b39336/intel-oneapi-base-toolkit-2025.3.0.372_offline.exe
          WINDOWS_DPCPP_COMPONENTS: intel.oneapi.win.cpp-dpcpp-common
        run: |
          curl.exe --output %TEMP%\webimage.exe --url %WINDOWS_BASEKIT_URL% --retry 5 --retry-delay 5
          start /b /wait %TEMP%\webimage.exe -s -x -f webimage_extracted --log extract.log
          del %TEMP%\webimage.exe
          webimage_extracted\bootstrapper.exe -s --action install --components=%WINDOWS_DPCPP_COMPONENTS% --eula=accept -p=NEED_VS2017_INTEGRATION=0 -p=NEED_VS2019_INTEGRATION=0 -p=NEED_VS2022_INTEGRATION=0 --log-dir=.
          set installer_exit_code=%ERRORLEVEL%
          rd /s/q "webimage_extracted"
          exit /b %installer_exit_code%

      # ---------- nv-codec-headers (CUDA leg only) ----------
      # libvmaf's CUDA path includes `<ffnvcodec/dynlink_cuda.h>`
      # (see libvmaf/src/meson.build §324). The Linux CUDA leg
      # installs this via `git clone … && make install`. On
      # Windows there's no `make install` story, but the package
      # is header-only — clone, copy the `include/ffnvcodec/`
      # tree into a known prefix, and append that prefix to the
      # `INCLUDE` env so `cl.exe` picks it up.
      - name: Install nv-codec-headers (windows)
        if: matrix.backend == 'cuda'
        shell: cmd
        run: |
          git clone --depth=1 https://code.ffmpeg.org/FFmpeg/nv-codec-headers nv-codec-headers
          mkdir nvcodec-prefix\include\ffnvcodec
          copy nv-codec-headers\include\ffnvcodec\*.h nvcodec-prefix\include\ffnvcodec\
          echo INCLUDE=%CD%\nvcodec-prefix\include;%INCLUDE%>>%GITHUB_ENV%

      # ---------- Strip ccache from PATH (Windows) ----------
      # `windows-latest` ships `C:\Strawberry\c\bin\ccache.exe` on
      # PATH. Meson's compiler-detection wraps nvcc with it
      # unconditionally → "Compiler ... ccache nvcc cannot compile
      # programs" (the wrap happens at meson configure time;
      # `CCACHE_DISABLE=1` only affects ccache at runtime, not
      # meson's wrap decision). Rename the binary so meson can't
      # find it.
      - name: Disable ccache wrap (windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $p = 'C:\Strawberry\c\bin\ccache.exe'
          if (Test-Path $p) { Rename-Item -Path $p -NewName 'ccache.exe.disabled' }
          Write-Host "ccache binary disabled"

      # ---------- Build ----------
      # CFLAGS/CXXFLAGS carry `/experimental:c11atomics` — without
      # that flag MSVC's `<stdatomic.h>` errors with "C atomic
      # support is not enabled" (libvmaf uses C11 atomics; meson's
      # compiler check rejects the toolchain otherwise).
      - name: Configure libvmaf (CUDA)
        if: matrix.backend == 'cuda'
        shell: cmd
        env:
          CFLAGS: /experimental:c11atomics
          CXXFLAGS: /experimental:c11atomics
        run: |
          meson setup libvmaf libvmaf\build --buildtype release ^
            --prefix %CD%\install ^
            -Denable_float=true ^
            ${{ matrix.meson_extra }}

      # ---------- Level Zero loader (SYCL leg only) ----------
      # libvmaf/src/meson.build:492 calls
      # `cc.find_library('ze_loader', required : true)` and
      # `libvmaf/src/sycl/common.cpp:26` includes
      # `<level_zero/ze_api.h>`. The Linux SYCL leg picks both up
      # from `intel-level-zero-gpu` / `level-zero-dev` apt packages.
      # Windows oneAPI BaseKit does NOT ship `ze_loader.lib`, so
      # build the loader from source (cmake build, header-only +
      # one .lib output). Mirror the `oneapi-src/level-zero` README
      # quick-build recipe; pin to v1.18.5 to match the version the
      # Linux Ubuntu 24.04 runners install via apt.
      - name: Install Level Zero loader (windows)
        if: matrix.backend == 'sycl'
        shell: cmd
        run: |
          git clone --depth=1 --branch v1.18.5 https://github.com/oneapi-src/level-zero level-zero-src
          cmake -S level-zero-src -B level-zero-src\build -DCMAKE_INSTALL_PREFIX=%CD%\level-zero-prefix -DCMAKE_BUILD_TYPE=Release
          cmake --build level-zero-src\build --config Release --target install
          echo INCLUDE=%CD%\level-zero-prefix\include;%INCLUDE%>>%GITHUB_ENV%
          echo LIB=%CD%\level-zero-prefix\lib;%LIB%>>%GITHUB_ENV%

      # `-Dcpp_std=c++14` overrides libvmaf's default `c++11`
      # because icx-cl 2025.3 only accepts c++14/c++17/c++20/c++latest
      # under MSVC ABI mode (drops c++11 from the standards list it
      # advertises to meson).
      - name: Configure libvmaf (SYCL)
        if: matrix.backend == 'sycl'
        shell: cmd
        env:
          CFLAGS: /experimental:c11atomics
          CXXFLAGS: /experimental:c11atomics
        run: |
          call "C:\Program Files (x86)\Intel\oneAPI\setvars.bat"
          set CC=icx-cl
          set CXX=icx-cl
          meson setup libvmaf libvmaf\build --buildtype release ^
            --prefix %CD%\install ^
            -Denable_float=true ^
            -Dcpp_std=c++14 ^
            ${{ matrix.meson_extra }}

      - name: Build libvmaf (CUDA)
        if: matrix.backend == 'cuda'
        shell: cmd
        run: |
          ninja -v -C libvmaf\build install

      - name: Build libvmaf (SYCL)
        if: matrix.backend == 'sycl'
        shell: cmd
        run: |
          call "C:\Program Files (x86)\Intel\oneAPI\setvars.bat"
          ninja -v -C libvmaf\build install

      # No test step — windows-latest has no GPU. The whole point of
      # this job is exercising the MSVC + CUDA / MSVC + oneAPI link
      # paths to catch portability regressions at compile time.
