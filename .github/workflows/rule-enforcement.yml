name: Rule Enforcement — ADR-0100 / 0106 / 0108

# ADR-0124: automated enforcement of the process ADRs.
# Three jobs — one blocking (deep-dive-checklist, ADR-0108), two
# advisory (doc-substance-check ADR-0100, adr-backfill-check ADR-0106).
# Copyright-header enforcement (ADR-0105) lives in pre-commit, not here.

on:
  pull_request:
    # `ready_for_review` (ADR-0331) lets the per-job draft gate fire CI
    # when a draft PR is promoted. `edited` stays because deep-dive-checklist
    # parses the PR body; an edit-without-push needs to re-validate.
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: rule-enforcement-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  deep-dive-checklist:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: Deep-Dive Deliverables Checklist (ADR-0108)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Skip upstream-port PRs
        id: scope
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
        run: |
          set -euo pipefail
          # ADR-0108 exempts verbatim upstream ports. Honour the existing
          # conventions: Conventional-Commit prefix `port:` or a branch
          # name under `port/`.
          if [[ "${PR_TITLE}" =~ ^port[:\(] ]] || [[ "${HEAD_REF}" =~ ^port/ ]]; then
            echo "exempt=true" >> "$GITHUB_OUTPUT"
            echo "PR is an upstream port — exempt from ADR-0108 deliverables."
          else
            echo "exempt=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ensure BASE_SHA + HEAD_SHA are reachable
        if: steps.scope.outputs.exempt == 'false'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        # actions/checkout@v6 with fetch-depth: 0 forces origin/master
        # to the simulated merge commit (refs/pull/N/merge), which can
        # leave the recorded base.sha and head.sha unreachable from the
        # local clone. Explicitly fetch both before any git diff so the
        # range is always valid, regardless of how the PR was rebased
        # or which merge-ref GitHub generated.
        run: |
          set -euo pipefail
          git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null \
            || git fetch --no-tags origin "${BASE_SHA}" || true
          git cat-file -e "${HEAD_SHA}^{commit}" 2>/dev/null \
            || git fetch --no-tags origin "${HEAD_SHA}" || true

      - name: Run deliverables checklist (parse + file-reference verification)
        if: steps.scope.outputs.exempt == 'false'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        # Single source of truth lives in scripts/ci/deliverables-check.sh
        # so a developer can run the same gate locally before `gh pr create`
        # via `make pr-check PR=<num>` (or by piping the body on stdin).
        run: bash scripts/ci/deliverables-check.sh

  doc-substance-check:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: Doc-Substance Gate (ADR-0100 / 0167)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    # ADR-0167 (2026-04-25): promoted from advisory to blocking and
    # tightened to require a *path-mapped* docs hit. ADR additions
    # alone no longer satisfy — they explain decisions to maintainers,
    # not usage to users (CLAUDE.md §12 rule 10). Per-PR opt-out is
    # `no docs needed: REASON` somewhere in the PR description.
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Path-mapped docs coverage check
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          set -euo pipefail

          # See deliverables-checklist job for rationale: fetch both
          # SHAs explicitly so the diff range is valid regardless of
          # how actions/checkout populated origin/master.
          git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null \
            || git fetch --no-tags origin "${BASE_SHA}" || true
          git cat-file -e "${HEAD_SHA}^{commit}" 2>/dev/null \
            || git fetch --no-tags origin "${HEAD_SHA}" || true

          git diff --name-only "${BASE_SHA}".."${HEAD_SHA}" > /tmp/diff_files.txt

          # Per-PR opt-out for refactor / bug-fix / test-only PRs that
          # genuinely have no user-visible delta. Stripping markdown
          # emphasis matches the deep-dive-checklist convention.
          printf '%s' "${PR_BODY:-}" | tr -d '`*_' > /tmp/pr_body.md
          if grep -qiE 'no docs needed[: ]' /tmp/pr_body.md; then
            echo "Doc-Substance: opt-out claimed in PR body ('no docs needed: ...')."
            exit 0
          fi

          # Surface → expected-docs-path mapping. Each row is
          #   <surface-regex> <expected-docs-regex>
          # Multiple surface rows can map to the same docs path.
          # ADR additions (docs/adr/) explicitly do NOT count as a
          # docs hit per ADR-0167.
          violations=()
          check_pair() {
            local surface_pat="$1"
            local docs_pat="$2"
            local label="$3"
            if grep -qE "${surface_pat}" /tmp/diff_files.txt; then
              if ! grep -qE "${docs_pat}" /tmp/diff_files.txt; then
                violations+=("${label}: surface ${surface_pat} touched but no edit under ${docs_pat}")
              fi
            fi
          }

          # libvmaf public headers → docs/api/
          check_pair '^libvmaf/include/libvmaf/libvmaf_cuda\.h$' \
                     '^docs/api/gpu\.md$' 'CUDA API header'
          check_pair '^libvmaf/include/libvmaf/libvmaf_sycl\.h$' \
                     '^docs/api/gpu\.md$' 'SYCL API header'
          check_pair '^libvmaf/include/libvmaf/libvmaf_dnn\.h$' \
                     '^docs/api/dnn\.md$' 'DNN API header'
          check_pair '^libvmaf/include/libvmaf/(libvmaf|picture|model)\.h$' \
                     '^docs/api/index\.md$' 'core API header'

          # feature extractors + their SIMD/GPU twins → docs/metrics/
          check_pair '^libvmaf/src/feature/(feature_|integer_)[^/]+\.c$' \
                     '^docs/metrics/' 'feature extractor'
          check_pair '^libvmaf/src/feature/(x86|arm64)/[^/]+\.(c|h)$' \
                     '^docs/metrics/' 'SIMD path'
          check_pair '^libvmaf/src/feature/cuda/[^/]+\.(c|cu|h|cuh)$' \
                     '^docs/(metrics/|backends/cuda/)' 'CUDA feature kernel'
          check_pair '^libvmaf/src/feature/sycl/[^/]+\.(cpp|hpp)$' \
                     '^docs/(metrics/|backends/sycl/)' 'SYCL feature kernel'

          # CLI + tools → docs/usage/
          check_pair '^libvmaf/tools/(cli_parse|vmaf|vmaf_bench)\.c$' \
                     '^docs/usage/' 'CLI tool'

          # build flags
          check_pair '^libvmaf/meson_options\.txt$' \
                     '^docs/development/build-flags\.md$' 'build flag'

          # MCP server
          check_pair '^mcp-server/vmaf-mcp/(src/|pyproject\.toml)' \
                     '^docs/mcp/' 'MCP server'

          # Tiny-AI surface
          check_pair '^ai/src/vmaf_train/cli/' \
                     '^docs/ai/' 'tiny-AI CLI'

          # ffmpeg integration
          check_pair '^ffmpeg-patches/.*\.patch$' \
                     '^docs/usage/' 'ffmpeg patch'

          if [ ${#violations[@]} -gt 0 ]; then
            echo "::error title=ADR-0167 doc-drift::${#violations[@]} surface(s) changed without matching docs/ edit:"
            for v in "${violations[@]}"; do
              echo "  - $v"
            done
            echo ""
            echo "Per CLAUDE.md §12 rule 10 / ADR-0100, every PR that"
            echo "changes a user-discoverable surface ships matching"
            echo "human-readable docs in the SAME PR. ADR additions under"
            echo "docs/adr/ explain decisions to maintainers, not usage"
            echo "to users — they do NOT satisfy this check (ADR-0167)."
            echo ""
            echo "Either:"
            echo "  1. Add the docs update under the indicated path, OR"
            echo "  2. Add 'no docs needed: REASON' to the PR description"
            echo "     (legitimate for pure internal refactor / bug fix)."
            exit 1
          fi

          echo "Doc-Substance: every touched user-discoverable surface has a matching docs/ edit."

  adr-backfill-check:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: ADR-Backfill Advisory (ADR-0106)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Scan diff for policy-surface edits without a new ADR
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          set -euo pipefail

          # See deliverables-checklist job for rationale.
          git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null \
            || git fetch --no-tags origin "${BASE_SHA}" || true
          git cat-file -e "${HEAD_SHA}^{commit}" 2>/dev/null \
            || git fetch --no-tags origin "${HEAD_SHA}" || true

          git diff --name-only "${BASE_SHA}".."${HEAD_SHA}" > /tmp/diff_files.txt

          adr_added=0
          if grep -qE '^docs/adr/[0-9]+-' /tmp/diff_files.txt; then
            adr_added=1
          fi

          policy_hit=0
          if grep -qE '^(libvmaf/include/|meson_options\.(txt|toml)|\.github/|docs/principles\.md$|CLAUDE\.md$|AGENTS\.md$|\.pre-commit-config\.yaml$)' /tmp/diff_files.txt; then
            policy_hit=1
          fi

          if [ "${policy_hit}" -eq 1 ] && [ "${adr_added}" -eq 0 ]; then
            echo "ADR-0106 advisory: policy / public-surface paths changed without a new ADR."
            echo "Policy paths in this PR:"
            grep -E '^(libvmaf/include/|meson_options\.|\.github/|docs/principles\.md$|CLAUDE\.md$|AGENTS\.md$|\.pre-commit-config\.yaml$)' /tmp/diff_files.txt || true
            echo ""
            echo "If the change is a refactor or a pure bug fix, no new ADR is required."
            echo "Otherwise write docs/adr/NNNN-*.md before merging (see ADR-0106)."
          else
            echo "ADR-0106 advisory: no policy surface changed, or a new ADR was added."
          fi
