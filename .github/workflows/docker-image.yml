name: Docker Image Build
on:
  push:
    branches: [master]
    paths:
      # Path-filter introduced in ADR-0317. Only fire when the Docker
      # build inputs actually change. Doc-only / Python-only PRs do not
      # need a Docker rebuild, and apt-mirror flakes (`apt-get install`
      # exit 100) on the runner produced 10–15 min of red noise on every
      # push during the doc/Python merge train (#409, #411, #412).
      - "Dockerfile"
      - ".dockerignore"
      - "libvmaf/**"
      - "meson.build"
      - "meson_options.txt"
      - ".github/workflows/docker-image.yml"
  pull_request:
    branches: [master]
    paths:
      - "Dockerfile"
      - ".dockerignore"
      - "libvmaf/**"
      - "meson.build"
      - "meson_options.txt"
      - ".github/workflows/docker-image.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  docker:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    # T7-CI-DEDUP / Research-0034 — advisory. The job runs `docker build`
    # but does NOT smoke-test the resulting image (no `docker run vmaf
    # vmaf --version` or equivalent), so a green job here only proves
    # "the Dockerfile parses" — no behavioural guarantee. Demoted from
    # blocking to advisory until a real image-validation step lands.
    # Track follow-up: T7-DOCKER-SMOKE.
    name: Docker Image Build
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Build Docker Image
        run: docker build -t vmaf .
