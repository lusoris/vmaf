# OpenSSF Scorecard — weekly supply-chain health scan.
#
# Publishes results to the OpenSSF public dashboard (Sigstore-signed attestation)
# and uploads SARIF into the GitHub Security tab so maintainers can see delta
# regressions on pinning, branch-protection, and dependency-review postures.
#
# Badge: README "OpenSSF Scorecard" links here.

name: scorecard
on:
  branch_protection_rule:
  schedule:
    - cron: "19 4 * * 1"
  push:
    branches: [master]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write     # upload SARIF to the Security tab
      id-token: write             # Sigstore attestation for the public dashboard
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false
      - name: Run Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a  # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: true
      - name: Upload artifact (debug / replay)
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: scorecard-sarif
          path: results.sarif
          retention-days: 14
      - name: Upload to GitHub Security tab
        # SHA pinned to the head commit of github/codeql-action's v4 tag
        # (resolved 2026-05-03). The previous pin (b25d0ebf...) was an
        # "imposter commit" — a SHA that no longer exists in the action
        # repository — which made Scorecard's webapp publish step fail
        # with a workflow-verification 400 error. See
        # docs/research/0053-ossf-scorecard-investigation.md and
        # docs/adr/0253-ossf-scorecard-policy.md.
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7  # v4
        with:
          sarif_file: results.sarif
