# Security scans: SAST (semgrep + CodeQL), secret scanning, dependency review.

name: Security Scans — Semgrep / CodeQL / Gitleaks / Dependency Review
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
    # ADR-0331 — `ready_for_review` lets the per-job draft gate fire
    # CI when a draft PR is promoted to ready-for-review.
    types: [opened, synchronize, reopened, ready_for_review]
  schedule:
    - cron: "0 6 * * 1"   # weekly Mon 06:00 UTC
  workflow_dispatch:

# Default to least-privilege; jobs that push SARIF to the Security tab
# (semgrep, codeql-*, gitleaks) opt into `security-events: write` per-job.
# dependency-review only needs `contents: read`. Addresses Scorecard
# TokenPermissionsID alert on the previously top-level write scope.
permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: Semgrep (CWE Top 25 + CERT-C + Custom)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write   # upload-sarif to Security tab
    container:
      # returntocorp/semgrep was renamed to semgrep/semgrep upstream. The old
      # image still resolves but ships an EOL semgrep-core that exits 7 when it
      # cannot load current `p/cwe-top-25` / `p/cert-c-strict` rulesets, which
      # uploads an empty SARIF and lights up a "Semgrep OSS is reporting errors"
      # banner on the repo Security tab.
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Run semgrep (local rules — gate on ERRORs)
        run: |
          # Local .semgrep.yml only: our custom rules for VMAF-specific
          # patterns (no-system-rand, no-strcpy-strcat-sprintf, etc.). They
          # run without the Semgrep Registry and can't be flaky from an
          # unreachable rule pack.
          # --error exits non-zero on ANY finding from these rules; they are
          # all real defect patterns we've already committed to avoiding.
          semgrep scan \
            --config=.semgrep.yml \
            --error \
            --sarif --output=semgrep-local.sarif
      - name: Run semgrep (registry rule packs — advisory)
        continue-on-error: true
        run: |
          # Registry packs (p/cwe-top-25, p/cert-c-strict, p/cert-cpp-strict):
          # upstream ships thousands of rules, some of which legitimately fire
          # on Netflix-authored upstream code we haven't yet cleaned up. Run
          # them for visibility on the Security tab, but don't gate merges —
          # that's CodeQL's job (security-and-quality suite, separate job).
          # continue-on-error because the Semgrep Registry occasionally rate-
          # limits unauthenticated fetches, which exits 7 with an empty SARIF.
          semgrep scan \
            --config=p/cwe-top-25 \
            --config=p/cert-c-strict \
            --config=p/cert-cpp-strict \
            --sarif --output=semgrep-registry.sarif || true
      - name: Upload local-rules SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7  # v4
        with:
          sarif_file: semgrep-local.sarif
          category: semgrep-local
      - name: Upload registry-rules SARIF
        if: always() && hashFiles('semgrep-registry.sarif') != ''
        uses: github/codeql-action/upload-sarif@e46ed2cbd01164d986452f91f178727624ae40d7  # v4
        with:
          sarif_file: semgrep-registry.sarif
          category: semgrep-registry

  # security-and-quality is a superset of security-extended, so specifying
  # both duplicates queries and trips the CodeQL setup UI's "ambiguous
  # configuration" detector. Pick one suite per job.
  codeql-cpp:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: CodeQL (C/C++)
    runs-on: ubuntu-latest
    timeout-minutes: 35
    permissions:
      contents: read
      security-events: write   # codeql-action/analyze uploads SARIF
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7  # v4
        with:
          languages: cpp
          queries: security-and-quality
          config-file: ./.github/codeql-config.yml
      - name: Build
        working-directory: libvmaf
        run: |
          sudo apt-get update
          sudo apt-get install -y meson ninja-build nasm
          meson setup build -Denable_cuda=false -Denable_sycl=false
          meson compile -C build
      - uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7  # v4
        with:
          category: "/language:cpp"

  codeql-python:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7  # v4
        with:
          languages: python
          queries: security-and-quality
          config-file: ./.github/codeql-config.yml
      - uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7  # v4
        with:
          category: "/language:python"

  # CodeQL's Actions-language support landed GA in late 2025. It scans
  # .github/workflows/*.yml for token-permission, injection, and pinning
  # issues. GitHub's default setup was auto-enabling this on the side; make
  # it explicit here so the job history is versioned with the repo.
  codeql-actions:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: CodeQL (Actions)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: github/codeql-action/init@e46ed2cbd01164d986452f91f178727624ae40d7  # v4
        with:
          languages: actions
          queries: security-and-quality
          config-file: ./.github/codeql-config.yml
      - uses: github/codeql-action/analyze@e46ed2cbd01164d986452f91f178727624ae40d7  # v4
        with:
          category: "/language:actions"

  secret-scan:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: Gitleaks (Secret Scan)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      security-events: write   # gitleaks-action uploads SARIF
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7  # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-review:
    name: Dependency Review (PR Diff)
    if: (github.event_name != 'pull_request' || github.event.pull_request.draft == false) && (github.event_name == 'pull_request')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48  # v4.9.0
        with:
          fail-on-severity: high
          deny-licenses: GPL-3.0, AGPL-3.0
