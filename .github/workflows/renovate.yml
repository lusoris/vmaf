name: Renovate

on:
  schedule:
    - cron: '17 4 * * 1'  # Monday 04:17 UTC ≈ 6am Vienna; offset per CronCreate fleet-distribution guidance
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: renovate-${{ github.ref }}
  cancel-in-progress: false

jobs:
  renovate:
    name: Mend Renovate
    # ADR-0359 caveat: Renovate's action shells to `docker run`, which
    # requires `/var/run/docker.sock`. The ARC runner pods don't ship
    # a Docker daemon (k8s-native, not Docker-in-Docker), so Renovate
    # MUST stay on ubuntu-latest. The 1× weekly cadence + on-demand
    # workflow_dispatch keeps the ubuntu-latest cost trivial.
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
      - name: Run Renovate
        uses: renovatebot/github-action@79dc0ba74dc3de28db0a7aeb1d0b95d5bf5fde2a  # v46.1.13
        with:
          configurationFile: renovate.json
          # Use GITHUB_TOKEN for in-repo dependency PRs. A PAT
          # (RENOVATE_TOKEN) is only required if Renovate needs to
          # cross repo boundaries — for a single-repo deployment, the
          # workflow-scoped GITHUB_TOKEN with pull-requests + issues
          # write permissions (declared above) is sufficient.
          # See ADR-0363 §Implementation notes.
          token: ${{ secrets.RENOVATE_TOKEN || secrets.GITHUB_TOKEN }}
