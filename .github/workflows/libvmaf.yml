name: libvmaf
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

# Ported from the now-deleted windows.yml (ADR-0115). Cancels superseded
# runs on the same ref so a force-push doesn't queue duplicate matrix runs.
concurrency:
  group: libvmaf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DEBIAN_FRONTEND: noninteractive

jobs:
  # ===== Linux / macOS / ARM builds =====
  libvmaf-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # --- CPU-only builds ---
          - os: ubuntu-latest
            CC: ccache gcc
            CXX: ccache g++
            name: Ubuntu gcc
          - os: ubuntu-latest
            CC: ccache clang
            CXX: ccache clang++
            name: Ubuntu clang
          - os: macos-latest
            CC: ccache clang
            CXX: ccache clang++
            name: macOS clang
            experimental: true
          - os: ubuntu-24.04-arm
            CC: ccache clang
            CXX: ccache clang++
            name: Ubuntu ARM clang

          # --- Static library builds ---
          - os: ubuntu-latest
            CC: ccache gcc
            CXX: ccache g++
            meson_extra: --default-library static
            name: Ubuntu gcc static
          - os: ubuntu-latest
            CC: ccache gcc
            CXX: ccache g++
            sycl: true
            meson_extra: --default-library static -Denable_sycl=true
            name: Ubuntu SYCL static
          - os: ubuntu-latest
            CC: ccache gcc
            CXX: ccache g++
            cuda: true
            meson_extra: --default-library static -Denable_cuda=true -Denable_nvcc=true
            name: Ubuntu CUDA static

          # --- SYCL build (gcc host + icpx for SYCL sources) ---
          - os: ubuntu-latest
            CC: ccache gcc
            CXX: ccache g++
            sycl: true
            meson_extra: -Denable_sycl=true
            name: Ubuntu SYCL

          # --- CUDA build (gcc + nvcc) ---
          - os: ubuntu-latest
            CC: ccache gcc
            CXX: ccache g++
            cuda: true
            meson_extra: -Denable_cuda=true -Denable_nvcc=true
            name: Ubuntu CUDA

          # --- SYCL + CUDA combined ---
          - os: ubuntu-latest
            CC: ccache gcc
            CXX: ccache g++
            sycl: true
            cuda: true
            meson_extra: -Denable_sycl=true -Denable_cuda=true -Denable_nvcc=true
            name: Ubuntu SYCL+CUDA

    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    env:
      CC: ${{ matrix.CC }}
      CXX: ${{ matrix.CXX }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: 3.11

      - name: Install meson and ninja
        run: |
          python -m pip install --upgrade pip
          pip install meson

      - name: Install dependencies (ubuntu)
        if: startsWith(matrix.os, 'ubuntu') && !matrix.sycl && !matrix.cuda
        run: |
          sudo apt-get update
          sudo -E apt-get -yq install ccache ninja-build nasm libomp-dev
          case "$CC" in
          *gcc)   sudo -E apt-get -yq install gcc g++ ;;
          *clang) sudo -E apt-get -yq install clang ;;
          esac

      - name: Install dependencies (mac)
        if: matrix.os == 'macos-latest'
        run: |
          brew install -q ninja nasm ccache llvm

      # ---------- Intel oneAPI (SYCL) ----------
      # Pinned to oneAPI 2025.3 (icpx 2025.3.x) and Level Zero v1.28.0.
      # 2025.0 was an ABI-breaking release, so pin to the 2025.3 minor meta
      # package rather than the unversioned 'latest' to avoid silent bumps.
      - name: Install Intel oneAPI
        if: matrix.sycl
        run: |
          sudo apt-get update
          sudo -E apt-get -yq install ccache ninja-build nasm gcc g++ gpg-agent
          wget -qO- https://apt.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB \
            | sudo gpg --dearmor -o /usr/share/keyrings/oneapi-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/oneapi-archive-keyring.gpg] https://apt.repos.intel.com/oneapi all main" \
            | sudo tee /etc/apt/sources.list.d/oneAPI.list
          sudo apt-get update
          sudo -E apt-get -yq install intel-oneapi-compiler-dpcpp-cpp-2025.3 cmake
          # Level Zero headers + loader library, pinned to stable tag.
          git clone --depth=1 --branch v1.28.0 \
            https://github.com/oneapi-src/level-zero.git /tmp/level-zero
          cmake -S /tmp/level-zero -B /tmp/level-zero/build -DCMAKE_INSTALL_PREFIX=/usr
          cmake --build /tmp/level-zero/build -j$(nproc)
          sudo cmake --install /tmp/level-zero/build
          rm -rf /tmp/level-zero
          echo "/opt/intel/oneapi/compiler/latest/bin" >> $GITHUB_PATH
          echo "/opt/intel/oneapi/compiler/latest/lib" | sudo tee /etc/ld.so.conf.d/oneapi.conf
          sudo ldconfig

      # ---------- CUDA toolkit ----------
      # Pinned to CUDA 13.0.0 (released 2025-08-04). 13.0 drops sm_50/60/70
      # (Maxwell/Pascal/Volta); meson.build already guards the sm_50 gencode
      # with a `<13` version check. Minimum driver for 13.x is >= 580.
      - name: Install CUDA toolkit
        if: matrix.cuda
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: '13.0.0'
          method: network
          sub-packages: '["nvcc", "cudart-dev"]'

      - name: Install nv-codec-headers
        if: matrix.cuda
        run: |
          git clone --depth=1 https://code.ffmpeg.org/FFmpeg/nv-codec-headers
          cd nv-codec-headers && sudo make install && cd .. && rm -rf nv-codec-headers

      - name: Install base deps for CUDA-only builds
        if: matrix.cuda && !matrix.sycl
        run: |
          sudo apt-get update
          sudo -E apt-get -yq install ccache ninja-build nasm gcc g++

      # ---------- Build ----------
      - name: Configure libvmaf
        run: |
          meson setup libvmaf libvmaf/build --buildtype release \
            --prefix $PWD/install \
            -Denable_float=true \
            ${{ matrix.meson_extra }}

      - name: Build libvmaf
        run: sudo ninja -vC libvmaf/build install

      # Verify pkgconfig for static linking
      - name: Verify static pkgconfig
        if: contains(matrix.meson_extra, 'static')
        run: |
          export PKG_CONFIG_PATH=$PWD/install/lib/pkgconfig:$PWD/install/lib/x86_64-linux-gnu/pkgconfig
          echo "=== libvmaf.pc ==="
          cat $PWD/install/lib/pkgconfig/libvmaf.pc || cat $PWD/install/lib/x86_64-linux-gnu/pkgconfig/libvmaf.pc
          echo ""
          echo "=== pkg-config --static --libs libvmaf ==="
          pkg-config --static --libs libvmaf
          # Static libs must include -lpthread and -lm
          pkg-config --static --libs libvmaf | grep -q '\-lpthread\|\-pthread'
          pkg-config --static --libs libvmaf | grep -q '\-lm'

      # CPU-only: full test suite + tox
      - name: Run tests
        if: "!matrix.sycl && !matrix.cuda"
        run: sudo ninja -vC libvmaf/build test

      - name: Run tox tests (ubuntu)
        if: "startsWith(matrix.os, 'ubuntu') && !matrix.sycl && !matrix.cuda"
        run: |
          mkdir -p ~/.ccache && sudo chown -R $(whoami) ~/.ccache
          pip install tox
          tox -c python

      - name: Run tox tests (mac)
        if: matrix.os == 'macos-latest'
        run: |
          mkdir -p ~/.ccache && sudo chown -R $(whoami) ~/.ccache
          pip install tox
          PATH=$(brew --prefix)/opt/llvm/bin:$PATH \
          CC=$(brew --prefix)/opt/llvm/bin/clang \
          CXX=$(brew --prefix)/opt/llvm/bin/clang++ \
          tox -c python

      # GPU builds: run tests that don't need hardware
      - name: Run CPU-only tests (GPU build)
        if: matrix.sycl || matrix.cuda
        run: |
          cd libvmaf/build
          for t in test_dict test_ref test_log test_thread_pool test_cpu \
                   test_feature test_cli_parse test_model test_predict \
                   test_ciede test_cambi test_psnr test_luminance_tools \
                   test_feature_collector test_framesync; do
            echo "=== $t ==="
            ./test/$t
          done

      # ---------- Artifacts ----------
      - name: Upload vmaf binary
        if: "!contains(matrix.meson_extra, 'static')"
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}-vmaf
          path: ./install/bin/vmaf

  # ===== Windows (MSYS2 / MinGW-w64) =====
  # Folded in from the now-deleted .github/workflows/windows.yml so the
  # full build matrix lives in one workflow file. See ADR-0115.
  # MINGW32 is intentionally disabled (vmaf score mismatch — upstream note);
  # 32-bit support would need a SIMD audit before re-enabling.
  #
  # Job key + name are intentionally `build` (matches the
  # `build (MINGW64, mingw-w64-x86_64)` required status check on master,
  # which was created when this job lived in windows.yml under
  # `jobs: build:`). Renaming would break branch protection until the
  # required-check list is updated separately. See ADR-0115.
  build:
    runs-on: windows-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          # - msystem: MINGW32
          #   MINGW_PACKAGE_PREFIX: mingw-w64-i686
          #   CFLAGS: -msse2 -mfpmath=sse -mstackrealign
          - msystem: MINGW64
            MINGW_PACKAGE_PREFIX: mingw-w64-x86_64
    env:
      CC: ccache gcc
      CXX: ccache g++
      CFLAGS: -pipe -static -O3 -mtune=generic -D_FILE_OFFSET_BITS=64 -mthreads
      CXXFLAGS: -pipe -static -O3 -mtune=generic -D_FILE_OFFSET_BITS=64 -mthreads
      LDFLAGS: -pipe -static -static-libgcc -static-libstdc++
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Cache ccache files
        uses: actions/cache@v5
        with:
          path: .ccache
          key: ${{ runner.os }}-${{ matrix.msystem }}-0-${{ hashFiles('**/*.c') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.msystem }}-0-
            ${{ runner.os }}-${{ matrix.msystem }}-

      - uses: msys2/setup-msys2@v2
        with:
          msystem: ${{ matrix.msystem }}
          install: >-
            ${{ matrix.MINGW_PACKAGE_PREFIX }}-ccache
            ${{ matrix.MINGW_PACKAGE_PREFIX }}-nasm
            ${{ matrix.MINGW_PACKAGE_PREFIX }}-pkg-config
            ${{ matrix.MINGW_PACKAGE_PREFIX }}-gcc
            ${{ matrix.MINGW_PACKAGE_PREFIX }}-meson
            ${{ matrix.MINGW_PACKAGE_PREFIX }}-ninja
            vim make diffutils
          update: true
          path-type: inherit

      - name: Set ccache dir
        run: echo "CCACHE_DIR=$PWD/.ccache" >> $GITHUB_ENV

      - name: Configure vmaf
        run: |
          meson setup libvmaf libvmaf/build --buildtype release \
            --default-library static --prefix "$MINGW_PREFIX" \
            -Denable_cuda=false -Denable_sycl=false -Denable_float=true

      - name: Build vmaf
        run: meson install -C libvmaf/build

      - name: Test vmaf
        run: meson test -C libvmaf/build --num-processes $(nproc)

      - name: Show binary info and stage artifact
        id: stage
        run: |
          ldd "$MINGW_PREFIX/bin/vmaf.exe" || true
          mkdir -p artifact
          cp "$MINGW_PREFIX/bin/vmaf.exe" artifact/vmaf.exe
          echo "path=$(cygpath -m "$PWD/artifact/vmaf.exe")" >> "$GITHUB_OUTPUT"

      - name: Upload vmaf.exe artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.msystem }}-vmaf
          path: ${{ steps.stage.outputs.path }}
          if-no-files-found: error
