# Light-touch pre-commit. The Netflix golden gate is intentionally NOT here
# (see D24) — it runs in CI only because it requires a built binary.
# The format/lint hooks run only on changed files for speed.

minimum_pre_commit_version: "3.5.0"
fail_fast: false

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # The hooks below have broad exclude patterns because the upstream
      # Netflix tree ships MATLAB sources, Python pickles (binary), and
      # precompiled MEX (.mexa64/.mexw64/.mexmaci64) that pre-commit's
      # text-transforming hooks would silently corrupt. Limit to the files
      # we actually author/maintain.
      - id: trailing-whitespace
        exclude: '\.patch$|^subprojects/|^libvmaf/test/data/|^model/|^python/test/resource/|^python/vmaf/resource/|^python/vmaf/matlab/|^testdata/|\.(pkl|mexa64|mexw64|mexmaci64|onnx|bin|yuv|npy)$'
      - id: end-of-file-fixer
        exclude: '\.patch$|^subprojects/|^libvmaf/test/data/|^model/|^python/test/resource/|^python/vmaf/resource/|^python/vmaf/matlab/|^testdata/|\.(pkl|mexa64|mexw64|mexmaci64|onnx|bin|yuv|npy)$'
      - id: check-merge-conflict
      - id: check-yaml
        # mkdocs.yml uses `!!python/name:...` tags (Material extensions, pymdownx
        # superfences) which the default SafeLoader can't resolve.
        exclude: '\.clang-format$|^mkdocs\.yml$'
      - id: check-json
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=1024"]
      - id: mixed-line-ending
        args: ["--fix=lf"]
        exclude: '^libvmaf/test/data/'
      - id: detect-private-key

  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v22.1.3
    hooks:
      - id: clang-format
        types_or: [c, c++, cuda]
        exclude: '^subprojects/|^libvmaf/test/data/'

  - repo: https://github.com/psf/black
    rev: 26.3.1
    hooks:
      - id: black
        files: '^(python|ai|scripts)/.*\.py$'
        # Upstream Netflix training-harness tree — not authored by us; see
        # pyproject.toml [tool.black] extend-exclude. Black's extend-exclude
        # only filters during directory walks, not explicitly-passed files,
        # so pre-commit needs its own exclude to skip them.
        exclude: '^python/test/resource/|^python/vmaf/resource/|^python/vmaf/matlab/'

  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        files: '^(python|ai|scripts)/.*\.py$'
        exclude: '^python/test/resource/|^python/vmaf/resource/|^python/vmaf/matlab/'

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.10
    hooks:
      - id: ruff-check
        files: '^(python|ai|scripts)/.*\.py$'
        exclude: '^python/test/resource/|^python/vmaf/resource/|^python/vmaf/matlab/'
        args: ["--fix"]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.13.1-1
    hooks:
      - id: shfmt
        args: ["-w", "-i", "2", "-ci"]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.1
    hooks:
      - id: gitleaks

  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v4.4.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args: [--strict, "feat", "fix", "perf", "refactor", "docs", "test", "build", "ci", "chore", "revert", "port", "sycl", "cuda", "simd"]
