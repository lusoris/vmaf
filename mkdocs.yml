site_name: "VMAF — Lusoris fork"
site_url: https://lusoris.github.io/vmaf/
site_description: Perceptual video quality assessment with GPU/SIMD acceleration.
repo_url: https://github.com/lusoris/vmaf
repo_name: lusoris/vmaf
edit_uri: edit/master/docs/
copyright: "BSD-3-Clause-Plus-Patent — Netflix / Lusoris"

docs_dir: docs
site_dir: build-docs/site

# ADR-0221 fragment files are concatenation source (assembled into
# `docs/adr/README.md` by `scripts/docs/concat-adr-index.sh`) — they are
# never rendered as standalone pages, so exclude them from the site build.
# Same for changelog fragments under `changelog.d/` (which live in repo
# root, not docs/, but listed here defensively if a future reorg moves
# them under docs/).
exclude_docs: |
  adr/_index_fragments/*

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
    - toc.follow
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - def_list
  - footnotes

validation:
  # Strict gate: `mkdocs build --strict` (run by .github/workflows/docs.yml)
  # fails on any WARNING. The validation table below decides which
  # categories are actionable enough to fail the build vs. which stay at
  # INFO because fixing them is blocked by an existing fork policy.
  #
  # Carve-outs and rationale:
  # - links.not_found: info — Two unfixable populations dominate this class:
  #   (a) intentional pointers from docs to source-tree files
  #   (`../../libvmaf/src/...`, `../../scripts/ci/...`,
  #   `../../.github/workflows/...`) that exist for grep-ability and
  #   GitHub-rendered navigation but cannot be resolved by mkdocs because
  #   they sit outside `docs_dir`; (b) cross-references between ADRs whose
  #   target slug has been renamed (ADR bodies are immutable once Accepted
  #   per ADR-0028 / ADR-0106, so the broken side cannot be edited). Until
  #   one of those policies changes, escalating this to `warn` is a
  #   permanent --strict failure that no PR can clear. Tracked at INFO so
  #   the log still surfaces them for opportunistic cleanup in `README.md`
  #   and other non-frozen surfaces.
  # - links.anchors: warn — actionable; in-doc anchor typos.
  # - links.unrecognized_links: info — same population shape as not_found:
  #   the dominant unrecognized form is a relative pointer to a directory
  #   in the source tree (`../../libvmaf/src/feature/iqa/`,
  #   `../../tools/vmaf-tune/`, `../../mcp-server/vmaf-mcp/`), kept for
  #   GitHub-rendered navigation and grep-ability. mkdocs cannot resolve
  #   them because they sit outside `docs_dir` and lack an `index.md`.
  #   The non-source-tree subset (bare dir-style links like
  #   `backends/` -> `backends/index.md`) was swept once on the
  #   ADR-0221-strict-gate PR; future occurrences are caught at INFO and
  #   tidied opportunistically.
  # - nav.omitted_files: warn — catches new orphan pages added to docs/
  #   without a nav row.
  # - nav.not_found: warn — catches typos in mkdocs.yml `nav:` entries.
  nav:
    # The fork's ADR (260+ files) and research-digest (80+ files) trees
    # are deliberately not enumerated in `nav:` — they use cross-link
    # navigation from `docs/adr/README.md` and inbound links from other
    # pages. Same for many topic-tree pages (e.g., `ai/models/*.md`,
    # `development/*-bisect-*.md`) that are linked from their parent
    # index but not listed individually. Promoting this to `warn`
    # would require either a 350-row nav explosion or routine churn
    # on the nav whenever a new ADR / digest / model card lands.
    omitted_files: info
    not_found: warn
    absolute_links: info
  links:
    not_found: info
    anchors: warn
    unrecognized_links: info

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/lusoris/vmaf

nav:
  - Home: index.md
  - Getting started:
      - getting-started/index.md
      - Install:
          - Ubuntu: getting-started/install/ubuntu.md
          - Fedora: getting-started/install/fedora.md
          - Arch: getting-started/install/arch.md
          - Alpine: getting-started/install/alpine.md
          - macOS: getting-started/install/macos.md
          - Windows: getting-started/install/windows.md
      - Building on Windows: getting-started/building-on-windows.md
  - Usage:
      - CLI reference: usage/cli.md
      - vmaf_bench: usage/bench.md
      - '--precision': usage/precision.md
      - Python library: usage/python.md
      - FFmpeg: usage/ffmpeg.md
      - Docker: usage/docker.md
      - MATLAB: usage/matlab.md
      - External resources: usage/external-resources.md
  - C API:
      - api/index.md
      - DNN sessions: api/dnn.md
      - GPU (CUDA / SYCL): api/gpu.md
  - Metrics:
      - Features: metrics/features.md
      - CAMBI: metrics/cambi.md
      - Confidence Interval: metrics/confidence-interval.md
      - Bad cases: metrics/bad-cases.md
      - CTC:
          - AOM: metrics/ctc/aom.md
          - NFLX: metrics/ctc/nflx.md
  - Models:
      - Overview: models/overview.md
      - Datasets: models/datasets.md
  - Backends:
      - backends/index.md
      - x86 SIMD (AVX2 / AVX-512): backends/x86/avx512.md
      - CUDA: backends/cuda/overview.md
      - NVTX profiling: backends/nvtx/profiling.md
      - SYCL / oneAPI: backends/sycl/overview.md
      - SYCL bundling: backends/sycl/bundling.md
  - MCP:
      - mcp/index.md
      - Tool reference: mcp/tools.md
  - Tiny AI:
      - ai/index.md
      - Overview: ai/overview.md
      - Training: ai/training.md
      - Inference: ai/inference.md
      - Benchmarks: ai/benchmarks.md
      - Security: ai/security.md
      - Bisect model quality: ai/bisect-model-quality.md
  - Development:
      - Engineering principles: principles.md
      - Build flags: development/build-flags.md
      - Release: development/release.md
  - Reference:
      - FAQ: reference/faq.md
      - References: reference/references.md
