# Per-GPU-generation ULP calibration table (ADR-0234, Research-0041).
#
# Maps a runtime-detected GPU identifier to the per-feature absolute
# tolerance the cross-backend parity gate should apply. The table is
# the threshold-tier expression of ADR-0234 — sister to the future
# ONNX calibration head described in the ADR. It does *not* correct
# scores; it only annotates the parity-gate verdict with a per-arch
# tolerance that reflects the empirical fp32-rounding floor of that
# silicon + driver combination.
#
# Lookup contract (see scripts/ci/cross_backend_calibration.py):
#
#   1. Caller supplies ``--gpu-id <runtime_id>`` to the gate script.
#      Format mirrors Research-0041:
#        - ``vulkan:0xVVVV:0xDDDD`` (Vulkan, vendor + device)
#        - ``cuda:M.m``             (CUDA, compute-capability major.minor)
#        - ``sycl:0xVVVV:DRIVER``   (SYCL, vendor + driver_version)
#      Trailing-glob ``*`` is permitted in the table id (covers a
#      generation family without enumerating every device id).
#   2. The loader picks the *most-specific* glob match (longest non-
#      wildcard prefix wins). Tie-break: file order.
#   3. Per-feature tolerance overrides the gate's default
#      ``FEATURE_TOLERANCE`` entry. If a feature is absent from the
#      matched gpu's ``features:`` block, the gate falls back to its
#      built-in per-feature default.
#   4. If no entry matches, the gate falls back to the ``--places``
#      / built-in default end-to-end (backward-compatible — existing
#      callers see no behaviour change).
#
# Calibration data points originate from Research-0041 corpus runs.
# Every row is either ``calibrated:`` (measured on real hardware /
# lavapipe with N>=100 frames per cell) or ``placeholder:`` (the
# entry exists so a future calibration run can drop measurements in
# without restructuring the file). A placeholder entry's tolerance
# values match the gate's built-in defaults, i.e. they are
# operationally a no-op until measured. The PR body lists which
# rows are calibrated vs placeholder.
---
version: 1

# Default for any feature not listed in a gpu's ``features:`` block.
# Mirrors ``DEFAULT_FP32_TOLERANCE`` in cross_backend_parity_gate.py.
default_fp32_tolerance: 5.0e-5
default_fp16_tolerance: 1.0e-2

gpus:

  # ---------------------------------------------------------------
  # Mesa lavapipe — software Vulkan ICD. Hosted-CI baseline; the
  # only arch the GitHub-runner lane can reach without bespoke
  # hardware. ``vendorID = 0x10005`` (VK_VENDOR_ID_MESA) — the
  # ``deviceID`` varies by Mesa build, so we glob it.
  #
  # Status: calibrated. Empirical floors observed in the
  # ``vulkan-parity-matrix-gate`` workflow over the ADR-0214 history
  # (vif/adm/motion/motion_v2/psnr land below 1e-6 because the
  # GLSL kernels run int64 accumulators; psnr_hvs / ciede /
  # ssimulacra2 hit the per-feature relaxed contract because of
  # transcendental codegen in lavapipe's LLVM backend).
  # ---------------------------------------------------------------
  - id: "vulkan:0x10005:*"
    label: "Mesa lavapipe (software Vulkan ICD)"
    status: calibrated
    notes: >-
      Hosted-CI baseline; deterministic across hosts. Tolerances
      mirror the gate's per-feature defaults — lavapipe is the
      reference against which the per-feature contracts were set
      (ADR-0214 / ADR-0188 / ADR-0192).
    features:
      vif: 5.0e-5
      adm: 5.0e-5
      motion: 5.0e-5
      motion_v2: 5.0e-5
      psnr: 5.0e-5
      float_moment: 5.0e-5
      float_ssim: 5.0e-5
      float_ms_ssim: 5.0e-5
      float_ms_ssim_lcs: 5.0e-5
      float_ansnr: 5.0e-5
      float_psnr: 5.0e-5
      float_motion: 5.0e-5
      float_vif: 5.0e-5
      float_adm: 5.0e-5
      ciede: 5.0e-3
      psnr_hvs: 5.0e-4
      ssimulacra2: 5.0e-3

  # ---------------------------------------------------------------
  # NVIDIA Ampere (sm_8.0 = A100, sm_8.6 = RTX 30 series).
  # CUDA backend.
  #
  # Status: placeholder. Tolerances copy the gate defaults; a
  # future calibration run on real hardware will replace these
  # in-place.
  # ---------------------------------------------------------------
  - id: "cuda:8.0"
    label: "NVIDIA Ampere A100 (sm_8.0)"
    status: placeholder
    notes: >-
      No real-hardware corpus collected yet — entry reserves the
      shape for a future calibration sweep on a self-hosted A100
      runner.
    features: {}

  - id: "cuda:8.6"
    label: "NVIDIA Ampere RTX 30 (sm_8.6)"
    status: placeholder
    notes: >-
      No real-hardware corpus collected yet — entry reserves the
      shape for a future calibration sweep on a self-hosted RTX
      30-series runner.
    features: {}

  # ---------------------------------------------------------------
  # NVIDIA Turing (sm_7.5 = RTX 20 / GTX 16 / Tesla T4).
  # ---------------------------------------------------------------
  - id: "cuda:7.5"
    label: "NVIDIA Turing RTX 20 / T4 (sm_7.5)"
    status: placeholder
    notes: >-
      No real-hardware corpus collected yet — entry reserves the
      shape for a future calibration sweep on a Turing runner.
    features: {}

  # ---------------------------------------------------------------
  # NVIDIA Ada Lovelace (sm_8.9 = RTX 40 series).
  # ---------------------------------------------------------------
  - id: "cuda:8.9"
    label: "NVIDIA Ada Lovelace RTX 40 (sm_8.9)"
    status: placeholder
    notes: >-
      No real-hardware corpus collected yet — entry reserves the
      shape for a future calibration sweep on an RTX 40-series
      runner.
    features: {}

  # ---------------------------------------------------------------
  # NVIDIA Hopper (sm_9.0 = H100). Data-centre.
  # ---------------------------------------------------------------
  - id: "cuda:9.0"
    label: "NVIDIA Hopper H100 (sm_9.0)"
    status: placeholder
    notes: >-
      No real-hardware corpus collected yet — entry reserves the
      shape for a future calibration sweep on an H100 runner.
    features: {}

  # ---------------------------------------------------------------
  # AMD RDNA2 (RX 6000 family). Vulkan + future HIP. vendorID
  # 0x1002 = AMD; deviceID 0x73xx is the canonical RDNA2 range.
  # ---------------------------------------------------------------
  - id: "vulkan:0x1002:0x73*"
    label: "AMD RDNA2 RX 6000 family"
    status: placeholder
    notes: >-
      No real-hardware corpus collected yet — entry reserves the
      shape for a future calibration sweep on a RX 6000 runner.
    features: {}

  # ---------------------------------------------------------------
  # AMD RDNA3 (RX 7000 family). deviceID 0x744x / 0x747x.
  # ---------------------------------------------------------------
  - id: "vulkan:0x1002:0x744*"
    label: "AMD RDNA3 RX 7000 family (Navi 31/32)"
    status: placeholder
    notes: >-
      No real-hardware corpus collected yet — entry reserves the
      shape for a future calibration sweep on a RX 7000 runner.
    features: {}

  - id: "vulkan:0x1002:0x747*"
    label: "AMD RDNA3 RX 7000 family (Navi 33)"
    status: placeholder
    notes: >-
      No real-hardware corpus collected yet — entry reserves the
      shape for a future calibration sweep on a RX 7000 runner.
    features: {}

  # ---------------------------------------------------------------
  # Intel Arc Alchemist (A-series, Xe-HPG). vendorID 0x8086.
  # The A380 is already in fork CI per ADR-0220; calibration data
  # will follow once the self-hosted runner ships ADR-0234's
  # collect_gpu_calibration_data.py.
  # ---------------------------------------------------------------
  - id: "vulkan:0x8086:0x56*"
    label: "Intel Arc Alchemist A-series (Xe-HPG)"
    status: placeholder
    notes: >-
      Self-hosted Arc A380 runner exists (ADR-0220 audit) but has
      not yet emitted a calibration corpus. Tolerances revert to
      gate defaults until measured.
    features: {}

  # ---------------------------------------------------------------
  # Intel Battlemage (B-series, Xe2-HPG). Future hardware.
  # ---------------------------------------------------------------
  - id: "vulkan:0x8086:0xe2*"
    label: "Intel Arc Battlemage B-series (Xe2-HPG)"
    status: placeholder
    notes: >-
      Hardware not yet in fork CI. Entry reserves the shape for
      future calibration.
    features: {}

  # ---------------------------------------------------------------
  # SYCL — Intel Compute Runtime on Arc. The driver_version is the
  # discriminating signal per ADR-0220 (different runtimes on the
  # same silicon emit different residuals).
  # ---------------------------------------------------------------
  - id: "sycl:0x8086:*"
    label: "Intel oneAPI SYCL (Arc, generic)"
    status: placeholder
    notes: >-
      Coarse fallback for any SYCL Intel device. Refine with a
      driver_version-pinned entry once ADR-0220's per-runtime
      residual matrix is reproduced under the calibration corpus.
    features: {}
