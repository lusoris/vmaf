[binaries]
c = 'aarch64-linux-gnu-gcc'
cpp = 'aarch64-linux-gnu-g++'
ar = 'aarch64-linux-gnu-ar'
strip = 'aarch64-linux-gnu-strip'
pkgconfig = 'aarch64-linux-gnu-pkg-config'
# T7-38: qemu-aarch64-static driven with `-cpu max,sve=on,sve2=on` so
# the SVE2 runtime gate (HWCAP2_SVE2 via getauxval) lights up. Pairs
# with build-aux/aarch64-linux-gnu.ini for NEON-only validation runs.
exe_wrapper = ['qemu-aarch64-static', '-cpu', 'max', '-L', '/usr/aarch64-linux-gnu']

[host_machine]
system = 'linux'
cpu_family = 'aarch64'
cpu = 'aarch64'
endian = 'little'
