# 32-bit x86 Linux cross-file — reproduces Netflix#1481 build environment.
#
# Requires host packages on Ubuntu:
#   sudo apt-get install -y gcc-multilib g++-multilib nasm meson ninja-build
#
# Netflix#1481 reports that `libvmaf` fails to build on 32-bit x86 with
# default options because `_mm256_extract_epi64` (AVX2 intrinsic that
# returns int64) is emitted by gcc only on __x86_64__ targets. The
# workaround documented in the issue is `-Denable_asm=false`. Until
# the underlying AVX2 code is gated on __x86_64__ in source, this
# cross-file is expected to be used in combination with
# `-Denable_asm=false` to get a clean i686 build.
#
# See ADR-0151 for the CI wiring + decision record.

[binaries]
c = 'gcc'
cpp = 'g++'
ar = 'ar'
strip = 'strip'
pkgconfig = 'pkg-config'

[built-in options]
c_args = ['-m32']
c_link_args = ['-m32']
cpp_args = ['-m32']
cpp_link_args = ['-m32']

[host_machine]
system = 'linux'
cpu_family = 'x86'
cpu = 'i686'
endian = 'little'
