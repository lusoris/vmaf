[tox]
envlist = py311, coverage


[testenv]
passenv = APPVEYOR*
          CI
          SSL_CERT_FILE
          TEST_MARKER
          TRAVIS*
          PATH
          CC
          CXX
          CFLAGS
          CXXFLAGS
setenv = COVERAGE_FILE={toxworkdir}/.coverage.{envname}
usedevelop = True
deps = -rrequirements.txt
       -rtest/requirements.txt
# TODO: way too many warnings in tests, remove `-p no:warnings` and get rid of them all
# --ignore=vmaf/resource: pytest --doctest-modules tries to import every .py
# under the rootdir to scan for docstrings. Files under vmaf/resource/ are
# config / parameter-dict data files, not real modules — and several have
# dots in their stems (e.g. vmaf_v7.2_bootstrap.py) that make them
# unimportable as Python modules. None of them carry doctests, so excluding
# the directory is correct rather than a workaround.
commands = pytest {posargs:-vv -p no:warnings -m {env:TEST_MARKER:main} --doctest-modules --ignore=vmaf/resource --cov-report term-missing --cov=vmaf/}


[testenv:coverage]
passenv = {[testenv]passenv}
setenv = COVERAGE_FILE={toxworkdir}/.coverage
basepython = python
skip_install = True
deps = coverage
# `ignore_outcome = true` prevents a non-zero exit from this env from
# failing the overall `tox` invocation. This is intentional: the coverage
# env is purely informational. On ARM CI runners the py311 interpreter is
# absent so the testenv is skipped, leaving zero .coverage.* data files;
# `coverage combine` then exits 1 with "No data to combine", failing every
# ARM PR build with a false positive. Marking ignore_outcome suppresses that
# false positive while still printing the coverage output when data exists.
# Real test failures surface through the py311 (or py3xx) testenv exit code,
# not through the coverage aggregation step. See fix/arm-ci-tox-coverage-combine.
ignore_outcome = true
commands = coverage combine
           coverage report -i -m
           coverage xml -i -o "{toxworkdir}/coverage.xml"
           coverage html -i -d "{toxworkdir}/coverage"

# The 'venv*' sections are a handy way of creating a venv for local development (with python3 or python2)
[testenv:venv]
basepython = python3
envdir = .venv
usedevelop = True
deps = -rrequirements.txt
       -rtest/requirements.txt
commands = python --version

# Configuration
[pytest]
cache_dir = .tox/.cache
python_files = *test.py
markers =
    main: Main tests

[coverage:run]
source = vmaf
